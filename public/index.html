<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Angry Remote</title>
  <style>
    :root{
      --bg:#0c1630;
      --card:#0f213f;
      --stroke:rgba(255,255,255,.18);
      --txt:rgba(255,255,255,.92);

      /* después lo ajustamos a verde menta + violetas */
      --btn:#6b5cff;
      --btn2:#2bd3ff;
      --danger:#ff3b3b;
      --muted:rgba(255,255,255,.08);
    }

    body{
      margin:0;
      background: radial-gradient(1200px 600px at 50% -20%, rgba(255,255,255,.12), transparent), var(--bg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color:var(--txt);
    }

    .wrap{ max-width: 520px; margin: 0 auto; padding: 14px; }
    .pillrow{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .pill{
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid var(--stroke);
      font-weight:600;
      letter-spacing:.2px;
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      display:inline-block;margin-right:8px;
      background:#f33;
    }
    .dot.on{ background:#23d18b; }

    .card{
      margin-top:14px;
      background:rgba(0,0,0,.18);
      border:1px solid var(--stroke);
      border-radius:18px;
      padding:14px;
    }
    .row{ display:flex; gap:10px; }
    input{
      flex:1;
      background:rgba(0,0,0,.25);
      border:1px solid var(--stroke);
      border-radius:14px;
      color:var(--txt);
      padding:12px 14px;
      font-size:18px;
      outline:none;
    }
    button{
      border:0;
      border-radius:16px;
      padding:14px 14px;
      font-size:18px;
      font-weight:800;
      color:white;
      background:var(--btn);
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      flex:1;
    }
    button.secondary{ background:var(--btn2); }
    button.danger{ background:var(--danger); }
    button.ghost{
      background:rgba(255,255,255,.05);
      border:1px solid var(--stroke);
      color:rgba(255,255,255,.65);
    }
    button:disabled{
      opacity:.35;
      cursor:not-allowed;
    }

    .grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
    .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .grid1{ display:grid; grid-template-columns:1fr; gap:10px; }

    .hint{ opacity:.75; line-height:1.2; margin:10px 0; }
    .small{ opacity:.7; font-size:14px; }

    /* Slingshot pad */
    .pad{
      margin-top:10px;
      height:260px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid var(--stroke);
      position:relative;
      overflow:hidden;
      touch-action:none; /* clave para arrastre */
    }
    .pad .center{
      position:absolute; left:50%; top:50%;
      width:10px; height:10px; border-radius:50%;
      transform:translate(-50%,-50%);
      background:rgba(255,255,255,.6);
    }
    .pad .stick{
      position:absolute; left:50%; top:50%;
      width:2px; height:2px;
      background:rgba(255,255,255,.65);
      transform-origin:0 0;
    }
    .pad .label{
      position:absolute; left:12px; top:10px;
      opacity:.85; font-weight:700;
    }

    .log{ margin-top:8px; font-size:14px; opacity:.85; }
    .ok{ color:#23d18b; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="pillrow">
      <div class="pill"><span class="small">CODE:</span> <span id="codeLabel">----</span></div>
      <div class="pill"><span class="dot" id="onlineDot"></span><span id="onlineLabel">offline</span></div>
      <div class="pill"><span class="small">Stage:</span> <span id="stageLabel">-</span></div>
      <div class="pill"><span class="small">Activo:</span> <span id="activeLabel">P1</span></div>
    </div>

    <div class="card">
      <div class="hint">Escaneá el QR. La botonera cambia sola según la escena (presence/state).</div>

      <div class="row">
        <input id="codeInput" placeholder="CODE" />
        <button id="okBtn">OK</button>
      </div>

      <div id="panel"></div>

      <div class="grid2" style="margin-top:10px;">
        <button class="ghost" id="homeBtn">HOME</button>
        <button class="ghost" id="restartBtn">RESTART</button>
      </div>

      <div class="grid1" style="margin-top:10px;">
        <button class="danger" id="exitBtn">EXIT</button>
      </div>

      <div class="log" id="lastCmd"></div>
    </div>
  </div>

<script>
  const $ = (id)=>document.getElementById(id);

  // code from url
  const url = new URL(location.href);
  let CODE = (url.searchParams.get("code") || "").trim().toUpperCase();
  $("codeInput").value = CODE || "";
  $("codeLabel").textContent = CODE || "----";

  let ACTIVE = "P1";

  function setOnline(on){
    $("onlineDot").classList.toggle("on", !!on);
    $("onlineLabel").textContent = on ? "online" : "offline";
  }

  function setStage(s){
    $("stageLabel").textContent = s || "-";
  }
  function setActive(a){
    $("activeLabel").textContent = a || "";
  }

  async function api(path, body){
    const res = await fetch(path, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(body)
    });
    return res.json();
  }

  async function send(cmd){
    if(!CODE) return;
    const full = `${ACTIVE}_${cmd}`;
    $("lastCmd").innerHTML = `<span class="ok">✅</span> cmd: ${full}`;
    await api("/api/send", { code: CODE, cmd: full });
  }

  function stageKey(stage){
    // Normaliza: "level1" "Level1" "level" => "level"
    const s = (stage||"").toLowerCase();
    if (s.startsWith("level")) return "level";
    if (s.includes("select")) return "select";
    if (s.includes("trailer")) return "trailer";
    if (s.includes("start")) return "start";
    return s || "start";
  }

  // ----- UI builders -----
  function btn(text, cmd, cls=""){
    const b = document.createElement("button");
    b.textContent = text;
    if (cls) b.className = cls;
    b.onclick = ()=>send(cmd);
    return b;
  }

  function renderPanel(stage){
    const key = stageKey(stage);
    const panel = $("panel");
    panel.innerHTML = "";

    if(key === "start"){
      panel.appendChild(document.createElement("div")).className="small";
      panel.lastChild.textContent = "Start";

      const g = document.createElement("div");
      g.className="grid2";
      g.style.marginTop="10px";
      g.appendChild(btn("PLAY","PLAY"));
      g.appendChild(btn("TRAILER","TRAILER","secondary"));
      panel.appendChild(g);
      return;
    }

    if(key === "trailer"){
      panel.appendChild(document.createElement("div")).className="small";
      panel.lastChild.textContent = "Trailer";

      const g = document.createElement("div");
      g.className="grid1";
      g.style.marginTop="10px";
      g.appendChild(btn("STOP","STOPTRAILER","danger"));
      panel.appendChild(g);
      return;
    }

    if(key === "select"){
      panel.appendChild(document.createElement("div")).className="small";
      panel.lastChild.textContent = "Level Select";

      const g1 = document.createElement("div");
      g1.className="grid3";
      g1.style.marginTop="10px";
      g1.appendChild(btn("LEFT","LEFT","ghost"));
      g1.appendChild(btn("PLAY","PLAY","secondary"));
      g1.appendChild(btn("RIGHT","RIGHT","ghost"));
      panel.appendChild(g1);

      // Si querés esconder levels directos, borrá este bloque.
      const g2 = document.createElement("div");
      g2.className="grid2";
      g2.style.marginTop="10px";
      g2.appendChild(btn("LEVEL 1","LEVEL1"));
      g2.appendChild(btn("LEVEL 2","LEVEL2"));
      panel.appendChild(g2);

      const g3 = document.createElement("div");
      g3.className="grid1";
      g3.style.marginTop="10px";
      g3.appendChild(btn("LEVEL 3","LEVEL3"));
      panel.appendChild(g3);
      return;
    }

    if(key === "level"){
      panel.appendChild(document.createElement("div")).className="small";
      panel.lastChild.textContent = "Level";

      // Slots
      const slots = document.createElement("div");
      slots.className="grid3";
      slots.style.marginTop="10px";
      slots.appendChild(btn("SLOT 1","SLOT1","ghost"));
      slots.appendChild(btn("SLOT 2","SLOT2","ghost"));
      slots.appendChild(btn("SLOT 3","SLOT3","ghost"));
      slots.appendChild(btn("SLOT 4","SLOT4","ghost"));
      slots.appendChild(btn("SLOT 5","SLOT5","ghost"));
      panel.appendChild(slots);

      // Power buttons
      const pow = document.createElement("div");
      pow.className="grid2";
      pow.style.marginTop="10px";
      pow.appendChild(btn("POWER","POWER","secondary"));
      pow.appendChild(btn("HAT","HAT","danger"));
      panel.appendChild(pow);

      // Slingshot pad
      const pad = document.createElement("div");
      pad.className = "pad";
      pad.innerHTML = `
        <div class="label">SLINGSHOT PAD (drag & release)</div>
        <div class="center"></div>
        <div class="stick" id="stick"></div>
      `;
      panel.appendChild(pad);

      setupPad(pad);
      return;
    }

    panel.appendChild(document.createElement("div")).className="small";
    panel.lastChild.textContent = `Stage desconocido: ${stage}`;
  }

  // ----- Slingshot pad logic (dx/dy normalizado) -----
  function setupPad(pad){
    const stick = pad.querySelector("#stick");
    let dragging = false;
    let startX = 0, startY = 0;

    function sendVec(kind, dx, dy){
      // Invertimos Y porque pantalla hacia abajo es +y,
      // y en Unity queremos +y hacia arriba.
      const ny = -dy;

      // clamp y mandar
      const cx = Math.max(-1, Math.min(1, dx));
      const cy = Math.max(-1, Math.min(1, ny));
      send(`${kind}:${cx.toFixed(3)},${cy.toFixed(3)}`);
    }

    function setStick(dx, dy){
      const w = pad.clientWidth;
      const h = pad.clientHeight;
      const radius = Math.min(w,h)*0.35;

      const px = dx * radius;
      const py = dy * radius;

      stick.style.transform = `translate(-50%,-50%) translate(${px}px,${py}px)`;
      stick.style.width = `${Math.sqrt(px*px+py*py)}px`;
      stick.style.height = `2px`;
      stick.style.left = "50%";
      stick.style.top = "50%";
      stick.style.transformOrigin = "0 0";
      stick.style.rotate = `${Math.atan2(py, px) * 180/Math.PI}deg`;
    }

    pad.addEventListener("pointerdown",(e)=>{
      dragging = true;
      pad.setPointerCapture(e.pointerId);
      startX = e.clientX;
      startY = e.clientY;
      setStick(0,0);
      sendVec("DRAG_BEGIN", 0, 0);
    });

    pad.addEventListener("pointermove",(e)=>{
      if(!dragging) return;
      const w = pad.clientWidth;
      const h = pad.clientHeight;
      const radius = Math.min(w,h)*0.35;

      const dx = (e.clientX - startX) / radius;
      const dy = (e.clientY - startY) / radius;

      setStick(dx,dy);
      sendVec("DRAG", dx, dy);
    });

    function end(e){
      if(!dragging) return;
      dragging = false;
      setStick(0,0);
      send("DRAG_END");
    }

    pad.addEventListener("pointerup", end);
    pad.addEventListener("pointercancel", end);
    pad.addEventListener("pointerleave", end);
  }

  // ----- Presence polling -----
  async function fetchState(){
    if(!CODE) return { ok:false };
    const res = await fetch(`/api/state?code=${encodeURIComponent(CODE)}`);
    return res.json();
  }

  async function loop(){
    try{
      const st = await fetchState();
      if(st && st.ok){
        setOnline(true);
        setStage(st.stage || "-");
        setActive(st.active || "");
        renderPanel(st.stage || "start");
      }else{
        setOnline(false);
      }
    }catch(e){
      setOnline(false);
    }
    setTimeout(loop, 700);
  }

  $("okBtn").onclick = ()=>{
    CODE = ($("codeInput").value || "").trim().toUpperCase();
    $("codeLabel").textContent = CODE || "----";
    url.searchParams.set("code", CODE);
    history.replaceState(null,"",url.toString());
    loop();
  };

  $("homeBtn").onclick = ()=>send("HOME");
  $("restartBtn").onclick = ()=>send("RESTART");
  $("exitBtn").onclick = ()=>send("EXIT");

  // start
  if(CODE) loop();
</script>
</body>
</html>
