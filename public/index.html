<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Angry Remote</title>

  <!-- Mantengo tu estética: asumimos que ya tenés tus estilos en /style -->
  <link rel="stylesheet" href="./style/style.css" />
</head>

<body>
  <div class="app">

    <!-- Header / status -->
    <div class="top">
      <div class="pill">
        <span class="label">CODE:</span>
        <span id="codeLabel" class="value">—</span>
      </div>

      <div class="pill">
        <span id="presenceDot" class="dot offline"></span>
        <span id="presenceText" class="value">offline</span>
      </div>

      <div class="pill">
        <span class="label">Stage:</span>
        <span id="stageLabel" class="value">—</span>
      </div>

      <div class="pill">
        <span class="label">Activo:</span>
        <span id="activeLabel" class="value">—</span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button id="tabP1" class="tab active" type="button">Player 1</button>
      <button id="tabP2" class="tab" type="button">Player 2</button>
      <button id="tabWait" class="tab" type="button">Espera</button>
    </div>

    <!-- Main card -->
    <div class="card">
      <div class="hint">
        Escaneá el QR. La botonera cambia sola según la escena (presence/state).<br/>
        Detectado: <b id="detectedLabel">—</b>
        <span id="rawStageLabel" style="opacity:.65; display:block; margin-top:6px; font-size:12px;">
          raw stage: —
        </span>
      </div>

      <div class="row">
        <input id="codeInput" class="input" placeholder="CÓDIGO" />
        <button id="okBtn" class="btn primary" type="button">OK</button>
      </div>

      <div class="divider"></div>

      <!-- CONTENEDORES DE BOTONES -->
      <div id="buttonsWrap"></div>

      <div class="divider"></div>

      <!-- Siempre visibles -->
      <div class="grid2">
        <button class="btn" id="homeBtn" type="button">HOME</button>
        <button class="btn" id="restartBtn" type="button">RESTART</button>
      </div>

      <button class="btn danger" id="exitBtn" type="button">EXIT</button>

      <div class="foot" id="footMsg"></div>
    </div>
  </div>

<script>
  // -----------------------------
  // Config
  // -----------------------------
  const LS_KEY = "angry_remote_code";

  // Qué botones mostrar según stage normalizado
  const BUTTONS = {
    start: [
      { cmd:"START", label:"PLAY" },
      { cmd:"TRAILER", label:"TRAILER" },
    ],
    trailer: [
      { cmd:"STOP_TRAILER", label:"STOP TRAILER" },
    ],
    select: [
      { cmd:"LEFT", label:"LEFT" },
      { cmd:"PLAY", label:"PLAY" },
      { cmd:"RIGHT", label:"RIGHT" },
    ],
    level: [
      // acá podés agregar los controles de gameplay si querés
      // { cmd:"POWER", label:"POWER" },
    ],
    wait: [
      // vacío apropósito
    ],
  };

  // -----------------------------
  // State
  // -----------------------------
  const state = {
    code: "",
    stage: "start",        // stage normalizado
    rawStage: "",          // stage crudo del server
    online: false,
    player: "P1",          // P1 / P2 / WAIT
  };

  // -----------------------------
  // Helpers
  // -----------------------------
  function $(id){ return document.getElementById(id); }

  function setPresence(online){
    state.online = !!online;
    $("presenceDot").classList.toggle("offline", !state.online);
    $("presenceDot").classList.toggle("online", state.online);
    $("presenceText").textContent = state.online ? "online" : "offline";
  }

  function normalizeStage(raw) {
    if (!raw) return "start";
    const s = String(raw).trim().toLowerCase();

    // Orden importante: levelselect antes que level
    if (s.includes("levelselect") || s.includes("level_select") || s === "select") return "select";
    if (s.includes("trailer")) return "trailer";
    if (s.includes("start")) return "start";
    if (s.includes("wait") || s.includes("espera")) return "wait";
    if (s.includes("level")) return "level";

    // fallback seguro
    return "start";
  }

  function setStage(rawStage){
    state.rawStage = rawStage || "";
    state.stage = normalizeStage(rawStage);

    $("stageLabel").textContent = state.stage;
    $("detectedLabel").textContent = state.stage;
    $("rawStageLabel").textContent = "raw stage: " + (state.rawStage || "—");

    renderButtons();
  }

  function setPlayer(p){
    state.player = p;
    $("activeLabel").textContent = p === "WAIT" ? "—" : p;

    $("tabP1").classList.toggle("active", p === "P1");
    $("tabP2").classList.toggle("active", p === "P2");
    $("tabWait").classList.toggle("active", p === "WAIT");

    renderButtons();
  }

  function renderButtons(){
    const wrap = $("buttonsWrap");
    wrap.innerHTML = "";

    const stageButtons = BUTTONS[state.stage] || [];
    const effectivePlayer = (state.player === "WAIT") ? "P1" : state.player; // comandos siempre con P1/P2

    // Si estás en WAIT, no mostramos botones stage (solo HOME/RESTART/EXIT)
    if (state.player === "WAIT") return;

    // En stage level, si no hay botones definidos, no mostramos nada extra
    stageButtons.forEach(b => {
      const btn = document.createElement("button");
      btn.className = "btn big";
      btn.type = "button";
      btn.textContent = b.label;
      btn.addEventListener("click", () => sendCmd(`${effectivePlayer}_${b.cmd}`));
      wrap.appendChild(btn);
    });
  }

  async function sendCmd(cmd){
    if (!state.code){
      $("footMsg").textContent = "Primero seteá el código.";
      return;
    }

    try{
      const res = await fetch("/api/send", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ code: state.code, cmd })
      });
      const j = await res.json().catch(()=> ({}));
      if (!res.ok) throw new Error(j?.error || "send failed");
      $("footMsg").textContent = `Enviado: ${cmd}`;
    }catch(e){
      $("footMsg").textContent = `Error: ${e.message || e}`;
    }
  }

  async function pollState(){
    if (!state.code){
      setPresence(false);
      setStage("");
      return;
    }

    try{
      const res = await fetch("/api/state?code=" + encodeURIComponent(state.code));
      const j = await res.json();

      // online si hay lastSeen reciente y/o stage presente
      setPresence(!!j.online);

      // Este es el cambio clave: aceptamos stage "levelselect", "startscene", "level1", etc.
      setStage(j.stage || "");

      // Si Unity manda activo como P1/P2
      if (j.active === "P1" || j.active === "P2") setPlayer(j.active);
    }catch(e){
      setPresence(false);
    }
  }

  // -----------------------------
  // UI events
  // -----------------------------
  $("okBtn").addEventListener("click", () => {
    const c = $("codeInput").value.trim();
    if (!c) return;
    state.code = c;
    localStorage.setItem(LS_KEY, c);
    $("codeLabel").textContent = c;
    $("footMsg").textContent = "✅ Code seteado.";
    pollState();
  });

  $("tabP1").addEventListener("click", () => setPlayer("P1"));
  $("tabP2").addEventListener("click", () => setPlayer("P2"));
  $("tabWait").addEventListener("click", () => setPlayer("WAIT"));

  $("homeBtn").addEventListener("click", () => sendCmd(`${state.player === "P2" ? "P2" : "P1"}_HOME`));
  $("restartBtn").addEventListener("click", () => sendCmd(`${state.player === "P2" ? "P2" : "P1"}_RESTART`));
  $("exitBtn").addEventListener("click", () => sendCmd(`${state.player === "P2" ? "P2" : "P1"}_EXIT`));

  // init
  (function init(){
    const saved = localStorage.getItem(LS_KEY) || "";
    if (saved){
      state.code = saved;
      $("codeInput").value = saved;
      $("codeLabel").textContent = saved;
      $("footMsg").textContent = "✅ Code cargado.";
    }else{
      $("codeLabel").textContent = "—";
    }

    setPlayer("P1");
    pollState();
    setInterval(pollState, 800);
  })();
</script>
</body>
</html>
