<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Angry Remote</title>

  <style>
    :root{
      /* SOLO menta + violetas */
      --mint-0:#e7fff5;
      --mint-1:#c9ffe9;
      --mint-2:#a7f7d7;

      --vio-0:#f3efff;
      --vio-1:#cbbcff;
      --vio-2:#9b83ff;
      --vio-3:#5b3dd9;
      --vio-4:#2a1366;
      --vio-5:#120627;

      --ink: rgba(12,6,30,.92);
      --radius: 18px;
      --gap: 12px;
      --btn-h: 68px;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    *{box-sizing:border-box;}
    html,body{height:100%; margin:0; font-family:var(--font); color:var(--ink);}
    body{
      background: linear-gradient(180deg, var(--mint-0) 0%, var(--mint-1) 52%, var(--mint-2) 100%);
      display:flex;
      align-items:stretch;
      justify-content:center;
    }

    .wrap{
      width:min(920px, 100%);
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap: var(--gap);
    }

    .topbar{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.55);
      border: 1px solid rgba(18,6,39,.08);
      backdrop-filter: blur(8px);
      flex-wrap:wrap;
    }
    .row{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
    .pill{
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing:.05em;
      background: rgba(243,239,255,.9);
      border: 1px solid rgba(18,6,39,.10);
      user-select:none;
      white-space:nowrap;
    }
    .codeBox input{
      width: 140px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(18,6,39,.15);
      background: rgba(255,255,255,.75);
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      outline: none;
    }
    .pillBtn{
      cursor:pointer;
      background: linear-gradient(180deg, rgba(203,188,255,.95) 0%, rgba(155,131,255,.90) 55%, rgba(91,61,217,.92) 100%);
      color:#fff;
      border-color: rgba(18,6,39,.18);
    }

    .panel{
      flex: 1;
      min-height: 560px;
      border-radius: 26px;
      overflow:hidden;
      position:relative;
      border: 1px solid rgba(18,6,39,.10);
      background: rgba(255,255,255,.55);
      box-shadow: 0 12px 28px rgba(18,6,39,.10);
    }

    .bg{
      position:absolute; inset:0;
      background-size: cover;
      background-position: center;
      opacity: 1;
    }

    .panelContent{
      position:relative;
      height:100%;
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap: 12px;
    }

    .title{
      font-size: 18px;
      font-weight: 900;
      letter-spacing:.02em;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.60);
      border: 1px solid rgba(18,6,39,.10);
      width: fit-content;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top:auto;
    }
    @media (min-width:720px){
      .grid{ grid-template-columns: repeat(3, 1fr); }
    }

    .imgBtn{
      height: var(--btn-h);
      border-radius: 18px;
      border: 1px solid rgba(18,6,39,.18);
      background: rgba(255,255,255,.55);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 8px;
      cursor:pointer;
      user-select:none;
      transition: transform .06s ease, box-shadow .06s ease;
      box-shadow: 0 10px 20px rgba(18,6,39,.10);
    }
    .imgBtn:active{ transform: translateY(1px) scale(.995); box-shadow: 0 6px 14px rgba(18,6,39,.10); }
    .imgBtn img{
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      filter: drop-shadow(0 3px 6px rgba(18,6,39,.18));
      pointer-events:none;
    }

    /* Overlay espera en Level1 para el que NO está en turno */
    .overlay{
      position:absolute;
      inset:0;
      display:none;
      z-index: 50;
    }
    .overlay.show{ display:block; }
    .overlay .panelContent{ background: rgba(255,255,255,.12); }
    .hint{
      font-size: 12px;
      opacity: .95;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.60);
      border: 1px solid rgba(18,6,39,.10);
      width: fit-content;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="row codeBox">
        <span class="pill" id="pillPlayer">P?</span>
        <span class="pill">SESSION</span>
        <input id="codeInput" placeholder="CULA" maxlength="12" />
        <span class="pill pillBtn" id="btnApply">APLICAR</span>
      </div>

      <div class="row">
        <span class="pill" id="pillStage">stage: ?</span>
        <span class="pill" id="pillActive">active: ?</span>
        <span class="pill" id="pillNet">net: ...</span>
      </div>
    </div>

    <section class="panel" id="panel">
      <div class="bg" id="bgMain"></div>
      <div class="panelContent">
        <div class="title" id="title">...</div>
        <div class="grid" id="grid"></div>
        <div class="hint" id="hint">
          P1: ?p=1 — P2: ?p=2
        </div>
      </div>

      <!-- Espera (LINDA) overlay -->
      <div class="overlay" id="overlayWait">
        <div class="bg" id="bgWait"></div>
        <div class="panelContent">
          <div class="title">ESPERA</div>
          <div class="grid" id="gridWait"></div>
          <div class="hint">Estás fuera de turno.</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    // ---------- helpers ----------
    function enc(name){ return encodeURIComponent(name); }
    function stylePng(filename){ return "style/" + enc(filename); }
    function setBg(el, filename){ el.style.backgroundImage = `url("${stylePng(filename)}")`; }

    function clearGrid(el){ while(el.firstChild) el.removeChild(el.firstChild); }

    // Botón con imagen que manda cmd por /api/send (tu server real)
    function makeImgBtn(cmd, filename, title){
      const b = document.createElement("button");
      b.className = "imgBtn";
      b.type = "button";
      b.title = title || cmd;

      const img = document.createElement("img");
      img.alt = title || cmd;
      img.src = stylePng(filename);

      b.appendChild(img);
      b.addEventListener("click", ()=>sendCommand(cmd));
      return b;
    }

    // ---------- session + player ----------
    const pillPlayer = document.getElementById("pillPlayer");
    const codeInput = document.getElementById("codeInput");
    const btnApply = document.getElementById("btnApply");

    const pillStage = document.getElementById("pillStage");
    const pillActive = document.getElementById("pillActive");
    const pillNet = document.getElementById("pillNet");

    const bgMain = document.getElementById("bgMain");
    const title = document.getElementById("title");
    const grid = document.getElementById("grid");

    const overlayWait = document.getElementById("overlayWait");
    const bgWait = document.getElementById("bgWait");
    const gridWait = document.getElementById("gridWait");

    const params = new URLSearchParams(location.search);
    let sessionCode = (params.get("code") || "").trim().toUpperCase();
    if(sessionCode) codeInput.value = sessionCode;

    let p = (params.get("p") || "").trim();
    if(p !== "1" && p !== "2") p = "1";
    const myPlayerTag = (p === "1") ? "P1" : "P2";
    pillPlayer.textContent = myPlayerTag;

    btnApply.addEventListener("click", ()=>{
      sessionCode = (codeInput.value || "").trim().toUpperCase();
      const u = new URL(location.href);
      if(sessionCode) u.searchParams.set("code", sessionCode);
      u.searchParams.set("p", p);
      history.replaceState({}, "", u.toString());
      pillNet.textContent = "net: ready";
    });

    // ---------- network ----------
    async function sendCommand(cmd){
      if(!sessionCode){
        pillNet.textContent = "net: sin code";
        return;
      }
      try{
        const r = await fetch("/api/send", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ code: sessionCode, cmd })
        });
        pillNet.textContent = r.ok ? "net: ok" : ("net: " + r.status);
      }catch(e){
        pillNet.textContent = "net: error";
      }
    }

    async function fetchState(){
      if(!sessionCode) return { ok:true, stage:"start", active:"" };
      try{
        const r = await fetch(`/api/state?code=${encodeURIComponent(sessionCode)}`, { cache:"no-store" });
        if(!r.ok) return { ok:true, stage:"start", active:"" };
        return await r.json();
      }catch(e){
        return { ok:true, stage:"start", active:"" };
      }
    }

    // ---------- stage mapping ----------
    function normalizeStage(s){
      s = (s || "").toString().trim().toLowerCase();
      if(!s) return "start";

      if(s.includes("select")) return "select";     // LevelSelect
      if(s.includes("level")) return "level1";      // Level1
      if(s.includes("start")) return "start";       // StartScene
      if(s.includes("trailer")) return "start";     // trailer vive en start
      return "start";
    }

    // ---------- render scene panels ----------
    function renderStart(active){
      // BG fijo según jugador
      setBg(bgMain, myPlayerTag === "P1" ? "BG P1.png" : "BG P2.png");

      title.textContent = `StartScene (${myPlayerTag})`;
      clearGrid(grid);

      // StartScene: Play, Trailer (StopTrailer cuando trailer andando), Exit
      grid.appendChild(makeImgBtn("PLAY", "PLAY.png", "PLAY"));
      grid.appendChild(makeImgBtn("TRAILER", "TRAILER.png", "TRAILER"));

      // Si Unity setea active="trailer" o algo, mostramos STOPTRAILER, si no, igual lo mostramos (no rompe)
      const trailerOn = (active || "").toString().toLowerCase().includes("trailer");
      if(trailerOn){
        grid.appendChild(makeImgBtn("STOPTRAILER", "RESTART.png", "STOPTRAILER"));
      }else{
        // opcional: lo dejamos igual para que no falte nunca (si preferís SIEMPRE visible, descomentá y borrá el if)
        grid.appendChild(makeImgBtn("STOPTRAILER", "RESTART.png", "STOPTRAILER"));
      }

      grid.appendChild(makeImgBtn("EXIT", "EXIT.png", "EXIT"));

      overlayWait.classList.remove("show");
    }

    function renderSelect(){
      setBg(bgMain, myPlayerTag === "P1" ? "BG P1.png" : "BG P2.png");

      title.textContent = `LevelSelect (${myPlayerTag})`;
      clearGrid(grid);

      // LevelSelect: right, play, left, home y exit
      grid.appendChild(makeImgBtn("LEFT", "LEFT.png", "LEFT"));
      grid.appendChild(makeImgBtn("RIGHT", "RIGHT.png", "RIGHT"));
      grid.appendChild(makeImgBtn("PLAY", "PLAY.png", "PLAY"));
      grid.appendChild(makeImgBtn("HOME", "HOME.png", "HOME"));
      grid.appendChild(makeImgBtn("EXIT", "EXIT.png", "EXIT"));

      overlayWait.classList.remove("show");
    }

    function renderLevel1(active){
      // BG fijo por jugador
      setBg(bgMain, myPlayerTag === "P1" ? "BG P1.png" : "BG P2.png");

      title.textContent = `Level1 (${myPlayerTag})`;
      clearGrid(grid);

      // Level1 botones (con prefijo de jugador)
      grid.appendChild(makeImgBtn(`${myPlayerTag}_SLOT0`, "OVEJITA.png", "OVEJITA"));
      grid.appendChild(makeImgBtn(`${myPlayerTag}_SLOT1`, "PATITO.png", "PATITO"));
      grid.appendChild(makeImgBtn(`${myPlayerTag}_SLOT2`, "CARPINCHITA.png", "CARPINCHITA"));
      grid.appendChild(makeImgBtn(`${myPlayerTag}_SLOT3`, "RITA.png", "RITA"));
      grid.appendChild(makeImgBtn(`${myPlayerTag}_SLOT4`, "VAQUITA PELUDA.png", "VAQUITA PELUDA"));
      grid.appendChild(makeImgBtn(`${myPlayerTag}_HAT`, "poder argentino.png", "PODER ARGENTINO"));

      grid.appendChild(makeImgBtn("HOME", "HOME.png", "HOME"));
      grid.appendChild(makeImgBtn("RESTART", "RESTART.png", "RESTART"));
      grid.appendChild(makeImgBtn("EXIT", "EXIT.png", "EXIT"));

      // Overlay espera para el que NO está en turno:
      // Tu server guarda active como string. Usamos active = "P1" / "P2" para turno.
      const turn = (active || "").toString().trim().toUpperCase();
      const myTurn = (turn === myPlayerTag);

      setBg(bgWait, "BG ESPERA.png");
      clearGrid(gridWait);

      // Panel espera (Linda1..4)
      gridWait.appendChild(makeImgBtn("LINDA1", "LINDA 1.png", "LINDA1"));
      gridWait.appendChild(makeImgBtn("LINDA2", "LINDA 2.png", "LINDA2"));
      gridWait.appendChild(makeImgBtn("LINDA3", "LINDA 3.png", "LINDA3"));
      gridWait.appendChild(makeImgBtn("LINDA4", "LINDA 4.png", "LINDA4"));

      // (opcional) home/exit también en espera
      gridWait.appendChild(makeImgBtn("HOME", "HOME.png", "HOME"));
      gridWait.appendChild(makeImgBtn("EXIT", "EXIT.png", "EXIT"));

      if(myTurn) overlayWait.classList.remove("show");
      else overlayWait.classList.add("show");
    }

    // ---------- main loop ----------
    async function tick(){
      const st = await fetchState();
      const stage = normalizeStage(st.stage);
      const active = (st.active || "");

      pillStage.textContent = "stage: " + stage;
      pillActive.textContent = "active: " + (active ? active : "-");

      if(stage === "start") renderStart(active);
      else if(stage === "select") renderSelect();
      else if(stage === "level1") renderLevel1(active);
      else renderStart(active);
    }

    // init
    tick();
    setInterval(tick, 350);
  </script>
</body>
</html>
