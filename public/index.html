<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Angry Remote</title>

<style>
:root{
  --bg:#0b1020;
  --card:#121a2a;
  --accent:#6d5efc;
  --danger:#ff3b3b;
  --text:#ffffff;
  --muted:#8da0c9;
  --radius:18px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  max-width:520px;
  margin:auto;
  padding:16px;
}

.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:16px;
  margin-top:14px;
}

.section-title{
  font-weight:900;
  margin-bottom:10px;
  font-size:14px;
  opacity:.9;
}

.status{
  font-size:13px;
  margin-bottom:10px;
  color:var(--muted);
}

.row{
  display:flex;
  gap:8px;
}

input{
  flex:1;
  padding:10px;
  border-radius:12px;
  border:none;
  outline:none;
}

button{
  padding:12px;
  border-radius:14px;
  border:none;
  font-weight:800;
  cursor:pointer;
  width:100%;
  margin-bottom:8px;
}

.primary{
  background:var(--accent);
  color:white;
}

.ghost{
  background:rgba(255,255,255,.08);
  color:white;
}

.danger{
  background:var(--danger);
  color:white;
}

.tabs{
  display:flex;
  gap:6px;
  margin-top:10px;
}

.tab{
  flex:1;
  padding:8px;
  border-radius:999px;
  border:none;
  font-weight:800;
  cursor:pointer;
  background:rgba(255,255,255,.06);
}

.tab.active{
  background:var(--accent);
}
</style>
</head>

<body>
<div class="wrap">

<h2>Angry Remote 🎮</h2>

<div class="status">
  CODE: <b id="roomCode">—</b><br>
  Stage: <b id="stageTxt">—</b><br>
  Active: <b id="activeTxt">—</b><br>
  Status: <b id="onlineTxt">offline</b>
</div>

<div class="row">
  <input id="codeInput" placeholder="Ingresar código">
  <button class="primary" id="btnSetCode">OK</button>
</div>

<div class="tabs">
  <button class="tab active" id="tabP1">P1</button>
  <button class="tab" id="tabP2">P2</button>
  <button class="tab" id="tabWait">WAIT</button>
</div>

<div class="card">
  <div id="commands"></div>
</div>

</div>

<script>
let uiMode = "P1";
let roomCode = localStorage.getItem("ROOM_CODE") || "";

const $ = id => document.getElementById(id);

$("codeInput").value = roomCode;
$("roomCode").textContent = roomCode || "—";

$("btnSetCode").onclick = () => {
  roomCode = $("codeInput").value.trim().toUpperCase();
  localStorage.setItem("ROOM_CODE", roomCode);
  $("roomCode").textContent = roomCode || "—";
};

$("tabP1").onclick = () => setTab("P1");
$("tabP2").onclick = () => setTab("P2");
$("tabWait").onclick = () => setTab("WAIT");

function setTab(mode){
  uiMode = mode;
  $("tabP1").classList.toggle("active", mode==="P1");
  $("tabP2").classList.toggle("active", mode==="P2");
  $("tabWait").classList.toggle("active", mode==="WAIT");
  renderCommands(lastState);
}

async function sendCmd(cmd){
  if(!roomCode) return;
  await fetch(`/api/cmd?code=${roomCode}&c=${cmd}`);
}

let lastState = null;

async function poll(){
  if(!roomCode) return;

  try{
    const r = await fetch(`/api/state?code=${roomCode}`);
    const data = await r.json();

    lastState = data;

    $("onlineTxt").textContent = data.online ? "online" : "offline";
    $("stageTxt").textContent = data.stage || "—";
    $("activeTxt").textContent = data.active || "—";

    renderCommands(data);
  }
  catch(e){
    $("onlineTxt").textContent = "offline";
  }
}

function addBtn(cmd, label, css="ghost"){
  const b = document.createElement("button");
  b.className = css;
  b.textContent = label;
  b.onclick = () => {
    const prefix = uiMode === "WAIT" ? "WAIT" : uiMode;
    sendCmd(prefix + "_" + cmd);
  };
  $("commands").appendChild(b);
}

function renderCommands(state){
  const wrap = $("commands");
  wrap.innerHTML = "";
  if(!state) return;

  const stage = state.stage;

  if(stage === "start"){
    addBtn("PLAY", "Play", "primary");
    return;
  }

  if(stage === "levelselect"){
    addBtn("LEVEL_1", "Level 1", "primary");
    addBtn("LEVEL_2", "Level 2", "primary");
    addBtn("LEVEL_3", "Level 3", "primary");
    addBtn("HOME", "Home");
    return;
  }

  if(stage === "level"){
    // Personajes
    addBtn("SLOT0", "Rita", "primary");
    addBtn("SLOT1", "Carpincha", "primary");
    addBtn("SLOT2", "Ovejita", "primary");
    addBtn("SLOT3", "Patito", "primary");
    addBtn("SLOT4", "Vaquita", "primary");

    // Poder argentino
    addBtn("HAT", "Poder Argentino 🇦🇷", "primary");

    // Utiles
    addBtn("RESTART", "Restart");
    addBtn("HOME", "Home");
    addBtn("EXIT", "Exit", "danger");
    return;
  }

  if(stage === "wait"){
    addBtn("OK", "OK", "primary");
    return;
  }
}

poll();
setInterval(poll, 1000);
</script>
</body>
</html>
