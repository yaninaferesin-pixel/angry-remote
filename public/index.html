<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Angry Remote</title>

  <style>
    @font-face {
      font-family: "MonsterChew";
      src: url("/Font/CCThisManThisMonster W00 Chew/CCThisManThisMonster W00 Chew.ttf") format("truetype");
      font-display: swap;
    }

    :root{
      --mint-0:#eef9f1;
      --mint-1:#dff2e5;
      --mint-2:#cfead8;
      --pink-0:#f7e9f6;
      --pink-1:#efdaf0;
      --vio-0:#f2e6ff;
      --vio-1:#dcbcff;
      --vio-2:#b986ff;
      --vio-3:#8a49ff;
      --vio-4:#4a147f;
      --ink:#142016;
      --card: rgba(255,255,255,.72);
      --stroke: rgba(30,60,40,.14);
      --shadow: 0 12px 26px rgba(0,0,0,.14);
      --radius: 26px;
      --safe-bottom: max(16px, env(safe-area-inset-bottom));
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      min-height:100%;
      background: linear-gradient(180deg, var(--mint-0), var(--mint-1));
      color:var(--ink);
      font-family: "MonsterChew", system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    body{
      display:flex;
      justify-content:center;
    }

    .app{
      width:min(540px, 100%);
      min-height:100vh;
      padding:10px 10px var(--safe-bottom);
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .hidden{ display:none !important; }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-radius:18px;
      background:var(--card);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
    }

    .topLeft{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .playerChip{
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,.72);
      border:1px solid rgba(0,0,0,.08);
      min-width:54px;
      height:44px;
      padding:0 14px;
      font:inherit;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,.08);
    }

    .playerChip.active{
      background: linear-gradient(180deg, var(--vio-0), var(--vio-2));
      color:#221235;
      border-color: rgba(90,31,214,.25);
    }

    .sessionMini{
      display:flex;
      align-items:center;
      gap:8px;
      flex:1;
      justify-content:flex-end;
    }

    .sessionMini input{
      width:110px;
      height:42px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.82);
      padding:0 12px;
      text-transform:uppercase;
      font:inherit;
      font-size:18px;
      outline:none;
    }

    .miniBtn{
      border:none;
      border-radius:999px;
      height:42px;
      padding:0 18px;
      font:inherit;
      font-size:18px;
      cursor:pointer;
      color:#25153a;
      background: linear-gradient(180deg, var(--vio-0), var(--vio-2));
      border:1px solid rgba(90,31,214,.22);
      box-shadow:0 8px 14px rgba(0,0,0,.10);
    }

    .statusRow{
      display:flex;
      gap:8px;
      margin-top:8px;
    }

    .statusBox{
      flex:1;
      min-height:46px;
      padding:10px 12px;
      border-radius:16px;
      background:rgba(255,255,255,.68);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:17px;
      line-height:1;
    }

    .screen{
      position:relative;
      flex:1;
      min-height:74vh;
      border-radius:28px;
      overflow:hidden;
      background:rgba(255,255,255,.50);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
    }

    .bg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:.98;
      pointer-events:none;
      user-select:none;
    }

    .layer{
      position:relative;
      z-index:2;
      height:100%;
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:14px;
    }

    .footerTitle{
      margin-top:auto;
      text-align:center;
      font-size:52px;
      line-height:.9;
      color:#f7f7f7;
      text-shadow:
        0 4px 0 rgba(0,0,0,.08),
        0 10px 18px rgba(0,0,0,.18);
      user-select:none;
      pointer-events:none;
    }

    .panelGlass{
      position:relative;
      flex:1;
      border-radius:28px;
      overflow:hidden;
      background:rgba(255,255,255,.30);
      border:1px solid rgba(255,255,255,.30);
      box-shadow:var(--shadow);
      min-height:60vh;
    }

    .panelInner{
      position:relative;
      z-index:2;
      height:100%;
      display:flex;
      flex-direction:column;
      gap:14px;
      padding:18px;
    }

    .panelBg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:.22;
      pointer-events:none;
      user-select:none;
    }

    .topIcons{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .topIcons.center{
      justify-content:center;
    }

    .iconRow{
      display:flex;
      gap:12px;
      align-items:center;
    }

    .iconBtn{
      width:62px;
      height:62px;
      border:none;
      border-radius:18px;
      background:rgba(255,255,255,.78);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      padding:10px;
    }

    .iconBtn.circle{
      width:74px;
      height:74px;
      border-radius:999px;
    }

    .iconBtn img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      pointer-events:none;
      user-select:none;
    }

    .centerStage{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:26px;
    }

    .singleImageButton{
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.12));
    }

    .singleImageButton img{
      display:block;
      width:auto;
      height:110px;
      object-fit:contain;
      pointer-events:none;
      user-select:none;
    }

    .singleImageButton.small img{
      height:74px;
    }

    .singleImageButton.medium img{
      height:92px;
    }

    .labelChip{
      padding:12px 18px;
      border-radius:14px;
      background:#b86ae7;
      color:#1a1a1a;
      box-shadow:var(--shadow);
      font-size:26px;
      line-height:1;
    }

    .charArea{
      flex:1;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px 18px;
      align-content:center;
      justify-items:center;
      padding:8px 10px 0;
    }

    .charBtn{
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.12));
    }

    .charBtn img{
      max-width:140px;
      max-height:120px;
      object-fit:contain;
      user-select:none;
      pointer-events:none;
    }

    .charBtn.wide{
      grid-column:1 / -1;
    }

    .charBtn.wide img{
      max-width:180px;
      max-height:138px;
    }

    .aimMode{
      height:100%;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .aimCanvas{
      position:relative;
      flex:1;
      min-height:68vh;
      border-radius:28px;
      overflow:hidden;
      background:rgba(255,255,255,.25);
      border:1px solid rgba(255,255,255,.22);
      touch-action:none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.14);
    }

    .aimCanvas img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      pointer-events:none;
      user-select:none;
    }

    .aimHint{
      position:absolute;
      left:14px;
      top:14px;
      padding:10px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.72);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      font-size:18px;
      z-index:3;
    }

    .powerDock{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:6px 0 0;
    }

    .powerOnly{
      width:120px;
      height:120px;
      border-radius:999px;
      border:none;
      background:rgba(255,255,255,.84);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      padding:16px;
    }

    .powerOnly img{
      width:100%;
      height:100%;
      object-fit:contain;
      pointer-events:none;
    }

    .waitingWrap{
      height:100%;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .waitingPanel{
      position:relative;
      flex:1;
      border-radius:26px;
      overflow:hidden;
      background:#d9cae4;
      border:1px solid rgba(0,0,0,.08);
      box-shadow:var(--shadow);
    }

    .waitingBg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:.45;
      pointer-events:none;
    }

    .waitingGrid{
      position:absolute;
      inset:100px 24px 24px 24px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
      z-index:2;
    }

    .waitCard{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .waitCard img{
      width:100%;
      max-width:170px;
      object-fit:contain;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.10));
    }

    @media (max-width:440px){
      .footerTitle{ font-size:42px; }
      .iconBtn{ width:56px; height:56px; }
      .iconBtn.circle{ width:66px; height:66px; }
      .singleImageButton img{ height:96px; }
      .singleImageButton.medium img{ height:82px; }
      .singleImageButton.small img{ height:66px; }
      .charBtn img{ max-width:120px; max-height:104px; }
      .charBtn.wide img{ max-width:160px; max-height:120px; }
      .powerOnly{ width:104px; height:104px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="topShell">
      <div id="topbar" class="topbar">
        <div class="topLeft">
          <button id="p1Btn" class="playerChip">P1</button>
          <button id="p2Btn" class="playerChip">P2</button>
        </div>

        <div class="sessionMini">
          <input id="codeInput" maxlength="12" placeholder="CULA" />
          <button id="applyBtn" class="miniBtn">APLICAR</button>
        </div>
      </div>

      <div id="statusRow" class="statusRow">
        <div class="statusBox">stage: <span id="stageText" style="margin-left:6px;">-</span></div>
        <div class="statusBox">active: <span id="activeText" style="margin-left:6px;">-</span></div>
        <div class="statusBox">net: <span id="netText" style="margin-left:6px;">...</span></div>
      </div>
    </div>

    <div class="screen" id="screen">
      <img id="screenBg" class="bg" alt="" />
      <div id="layer" class="layer"></div>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);

  let player = "P1";
  let code = "CULA";
  let lastState = { stage:"start", active:"", ts:0 };
  let netOk = false;

  let selectedSlot = null;
  let shotFired = false;

  const IMG = {
    BG_WAIT: "/style/BG ESPERA.png",
    BG_P1: "/style/BG P1.png",
    BG_P2: "/style/BG P2.png",
    BG_SLING: "/style/Y slingshot.png",

    PLAY: "/style/PLAY.png",
    TRAILER: "/style/TRAILER.png",
    RESTART: "/style/RESTART.png",
    EXIT: "/style/EXIT.png",
    HOME: "/style/HOME.png",
    LEFT: "/style/LEFT.png",
    RIGHT: "/style/RIGHT.png",

    OVEJITA: "/style/OVEJITA.png",
    PATITO: "/style/PATITO.png",
    CARPINCHITA: "/style/CARPINCHITA.png",
    RITA: "/style/RITA.png",
    VAQUITA_PELUDA: "/style/VAQUITA PELUDA.png",

    HAT: "/style/poder argentino.png",
    POWER: "/style/PLAY.png",

    WAIT1: "/style/pig1.png",
    WAIT2: "/style/pig2.png",
    WAIT3: "/style/pig3.png",
    WAIT4: "/style/pig4.png"
  };

  function getPlayerFromUrl(){
    const u = new URL(location.href);
    const p = (u.searchParams.get("p") || u.searchParams.get("player") || "").trim();
    if (p === "2") return "P2";
    if (p === "1") return "P1";
    return "";
  }

  function loadPersisted(){
    player = getPlayerFromUrl() || localStorage.getItem("angry_player") || "P1";
    code = (new URL(location.href)).searchParams.get("code") || localStorage.getItem("angry_code") || "CULA";
    $("codeInput").value = code;
  }

  function setPlayer(p){
    player = p;
    localStorage.setItem("angry_player", player);
    selectedSlot = null;
    shotFired = false;
    render();
  }

  $("p1Btn").onclick = ()=> setPlayer("P1");
  $("p2Btn").onclick = ()=> setPlayer("P2");

  $("applyBtn").onclick = ()=>{
    code = ($("codeInput").value || "").trim().toUpperCase() || "CULA";
    localStorage.setItem("angry_code", code);
    render();
  };

  async function apiGetState(){
    try{
      const r = await fetch(`/api/state?code=${encodeURIComponent(code)}`, { cache:"no-store" });
      const j = await r.json();
      if (j && j.ok){
        lastState = { stage: j.stage || "start", active: j.active || "", ts: j.ts || 0 };
        netOk = true;
      } else {
        netOk = false;
      }
    }catch(e){
      netOk = false;
    }
  }

  async function apiSend(cmd){
    try{
      await fetch("/api/send", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ code, cmd })
      });
      netOk = true;
    }catch(e){
      netOk = false;
    }
  }

  function normalizeStage(s){
    s = (s || "").toLowerCase().trim();
    if (s.includes("trailer")) return "trailer";
    if (s.includes("select")) return "select";
    if (s.includes("level")) return "level";
    if (s.includes("start")) return "start";
    return "start";
  }

  function isWaiting(){
    const act = (lastState.active || "").trim().toUpperCase();
    if (!act) return false;
    return act !== player;
  }

  function isCurrentPlayerActive(){
    const act = (lastState.active || "").trim().toUpperCase();
    if (!act) return true;
    return act === player;
  }

  function bgForMain(stage){
    if (stage === "level" && selectedSlot !== null) return IMG.BG_SLING;
    return player === "P2" ? IMG.BG_P2 : IMG.BG_P1;
  }

  function updateTopVisibility(stage){
    const topShell = $("topShell");
    if (stage === "start" || stage === "trailer"){
      topShell.classList.remove("hidden");
    } else {
      topShell.classList.add("hidden");
    }
  }

  function applyTopSelection(){
    $("p1Btn").classList.toggle("active", player === "P1");
    $("p2Btn").classList.toggle("active", player === "P2");
    $("stageText").textContent = normalizeStage(lastState.stage);
    $("activeText").textContent = lastState.active || "-";
    $("netText").textContent = netOk ? "ok" : "offline";
  }

  function clearLayer(){
    const layer = $("layer");
    while (layer.firstChild) layer.removeChild(layer.firstChild);
    return layer;
  }

  function makeImageButton(src, onClick, className="iconBtn"){
    const b = document.createElement("button");
    b.className = className;
    b.innerHTML = `<img src="${src}" alt="">`;
    b.onclick = onClick;
    return b;
  }

  function footerText(){
    return player === "P1" ? "PLAYER 1" : "PLAYER 2";
  }

  function addFooter(layer, textOverride){
    const ft = document.createElement("div");
    ft.className = "footerTitle";
    ft.textContent = textOverride || footerText();
    layer.appendChild(ft);
  }

  function buildGlassPanel(){
    const panel = document.createElement("div");
    panel.className = "panelGlass";

    const bg = document.createElement("img");
    bg.className = "panelBg";
    bg.src = player === "P2" ? IMG.BG_P2 : IMG.BG_P1;
    panel.appendChild(bg);

    const inner = document.createElement("div");
    inner.className = "panelInner";
    panel.appendChild(inner);

    return { panel, inner };
  }

  function renderStart(stage){
    const layer = clearLayer();
    const { panel, inner } = buildGlassPanel();

    if (stage === "trailer"){
      const top = document.createElement("div");
      top.className = "topIcons center";

      const trailerLabel = document.createElement("div");
      trailerLabel.className = "labelChip";
      trailerLabel.textContent = "TRAILER";

      top.appendChild(trailerLabel);
      inner.appendChild(top);
    }

    const center = document.createElement("div");
    center.className = "centerStage";

    const playBtn = makeImageButton(IMG.PLAY, ()=> apiSend(`${player}_PLAY`), "singleImageButton");
    playBtn.classList.add("medium");
    center.appendChild(playBtn);

    if (stage !== "trailer"){
      const trailerBtn = makeImageButton(IMG.TRAILER, ()=> apiSend(`${player}_TRAILER`), "singleImageButton");
      trailerBtn.classList.add("small");
      center.appendChild(trailerBtn);
    }

    const exitBtn = makeImageButton(IMG.EXIT, ()=> apiSend(`${player}_EXIT`), "singleImageButton");
    exitBtn.classList.add("small");
    center.appendChild(exitBtn);

    inner.appendChild(center);
    layer.appendChild(panel);
    addFooter(layer);
  }

  function renderLevelSelect(){
    const layer = clearLayer();
    const { panel, inner } = buildGlassPanel();

    const top = document.createElement("div");
    top.className = "topIcons";

    const leftIcons = document.createElement("div");
    leftIcons.className = "iconRow";
    leftIcons.appendChild(makeImageButton(IMG.HOME, ()=> apiSend(`${player}_HOME`), "iconBtn"));
    top.appendChild(leftIcons);

    const rightIcons = document.createElement("div");
    rightIcons.className = "iconRow";
    rightIcons.appendChild(makeImageButton(IMG.EXIT, ()=> apiSend(`${player}_EXIT`), "iconBtn circle"));
    rightIcons.appendChild(makeImageButton(IMG.RESTART, ()=> apiSend(`${player}_RESTART`), "iconBtn circle"));
    top.appendChild(rightIcons);

    inner.appendChild(top);

    const center = document.createElement("div");
    center.className = "centerStage";

    const trailerLabel = document.createElement("div");
    trailerLabel.className = "labelChip";
    trailerLabel.textContent = "LEVEL SELECT";
    center.appendChild(trailerLabel);

    const navRow = document.createElement("div");
    navRow.className = "iconRow";
    navRow.style.justifyContent = "center";
    navRow.style.width = "100%";

    navRow.appendChild(makeImageButton(IMG.LEFT, ()=> apiSend(`${player}_LEFT`), "iconBtn circle"));
    navRow.appendChild(makeImageButton(IMG.PLAY, ()=> apiSend(`${player}_PLAY`), "iconBtn circle"));
    navRow.appendChild(makeImageButton(IMG.RIGHT, ()=> apiSend(`${player}_RIGHT`), "iconBtn circle"));

    center.appendChild(navRow);
    inner.appendChild(center);

    layer.appendChild(panel);
    addFooter(layer);
  }

  function renderCharacterSelectInLevel(){
    const layer = clearLayer();
    const { panel, inner } = buildGlassPanel();

    const top = document.createElement("div");
    top.className = "topIcons";

    const leftIcons = document.createElement("div");
    leftIcons.className = "iconRow";
    leftIcons.appendChild(makeImageButton(IMG.HOME, ()=> apiSend(`${player}_HOME`), "iconBtn"));
    top.appendChild(leftIcons);

    const rightIcons = document.createElement("div");
    rightIcons.className = "iconRow";
    rightIcons.appendChild(makeImageButton(IMG.EXIT, ()=> apiSend(`${player}_EXIT`), "iconBtn circle"));
    rightIcons.appendChild(makeImageButton(IMG.RESTART, ()=> apiSend(`${player}_RESTART`), "iconBtn circle"));
    top.appendChild(rightIcons);

    inner.appendChild(top);

    const chars = document.createElement("div");
    chars.className = "charArea";

    [
      { img: IMG.HAT, slot: null, action: ()=> apiSend(`${player}_HAT`) },
      { img: IMG.RITA, slot: 3 },
      { img: IMG.VAQUITA_PELUDA, slot: 4 },
      { img: IMG.OVEJITA, slot: 0 },
      { img: IMG.PATITO, slot: 1 },
      { img: IMG.CARPINCHITA, slot: 2 }
    ].forEach(c=>{
      const btn = makeImageButton(c.img, async ()=>{
        shotFired = false;

        if (c.action){
          await c.action();
          return;
        }

        selectedSlot = c.slot;
        await apiSend(`${player}_SLOT${c.slot}`);
        render();
      }, "charBtn");

      chars.appendChild(btn);
    });

    inner.appendChild(chars);
    layer.appendChild(panel);
    addFooter(layer);
  }

  function renderAimStage(){
    const layer = clearLayer();

    const aimWrap = document.createElement("div");
    aimWrap.className = "aimMode";

    const top = document.createElement("div");
    top.className = "topIcons";

    const leftIcons = document.createElement("div");
    leftIcons.className = "iconRow";
    leftIcons.appendChild(makeImageButton(IMG.HOME, ()=> apiSend(`${player}_HOME`), "iconBtn"));
    top.appendChild(leftIcons);

    const rightIcons = document.createElement("div");
    rightIcons.className = "iconRow";
    rightIcons.appendChild(makeImageButton(IMG.EXIT, ()=> apiSend(`${player}_EXIT`), "iconBtn circle"));
    rightIcons.appendChild(makeImageButton(IMG.RESTART, async ()=> {
      selectedSlot = null;
      shotFired = false;
      await apiSend(`${player}_RESTART`);
      render();
    }, "iconBtn circle"));
    top.appendChild(rightIcons);

    aimWrap.appendChild(top);

    const aimCanvas = document.createElement("div");
    aimCanvas.className = "aimCanvas";

    const aimBg = document.createElement("img");
    aimBg.src = IMG.BG_SLING;
    aimCanvas.appendChild(aimBg);

    const badge = document.createElement("div");
    badge.className = "aimHint";
    badge.textContent = shotFired ? "POWER" : "SLINGSHOT";
    aimCanvas.appendChild(badge);

    let dragging = false;
    let rect = null;
    let lastAim = { dx: 0, dy: 0 };
    let aimDirty = false;
    let aimSending = false;
    let rafPending = false;

    function getXY(ev){
      const t = ev.touches ? ev.touches[0] : ev;
      return { x: t.clientX, y: t.clientY };
    }

    function normFromPoint(x, y){
      if (!rect) rect = aimCanvas.getBoundingClientRect();

      const cx = rect.left + rect.width * 0.5;
      const cy = rect.top + rect.height * 0.70;

      const dx = (x - cx) / (rect.width * 0.72);
      const dy = (y - cy) / (rect.height * 0.92);

      const cdx = Math.max(-1, Math.min(0, dx));
      const cdy = Math.max(-1, Math.min(0, dy));

      return { dx: cdx, dy: cdy };
    }

    function fmt(n){
      return (Math.round(n * 1000) / 1000).toString();
    }

    async function flushAimLoop(){
      if (aimSending) return;
      aimSending = true;

      while (aimDirty) {
        aimDirty = false;
        await apiSend(`${player}_AIM ${fmt(lastAim.dx)} ${fmt(lastAim.dy)}`);
      }

      aimSending = false;
    }

    function queueAim(dx, dy){
      lastAim = { dx, dy };
      aimDirty = true;

      if (!rafPending) {
        rafPending = true;
        requestAnimationFrame(() => {
          rafPending = false;
          flushAimLoop();
        });
      }
    }

    async function fireNow(){
      await flushAimLoop();
      await apiSend(`${player}_FIRE ${fmt(lastAim.dx)} ${fmt(lastAim.dy)}`);
      shotFired = true;
      render();
    }

    if (!shotFired){
      aimCanvas.addEventListener("touchstart", (ev)=>{
        ev.preventDefault();
        dragging = true;
        rect = aimCanvas.getBoundingClientRect();
        const {x,y} = getXY(ev);
        const p = normFromPoint(x,y);
        queueAim(p.dx, p.dy);
      }, { passive:false });

      aimCanvas.addEventListener("touchmove", (ev)=>{
        if (!dragging) return;
        ev.preventDefault();
        const {x,y} = getXY(ev);
        const p = normFromPoint(x,y);
        queueAim(p.dx, p.dy);
      }, { passive:false });

      aimCanvas.addEventListener("touchend", async (ev)=>{
        if (!dragging) return;
        ev.preventDefault();
        dragging = false;
        await fireNow();
      }, { passive:false });

      aimCanvas.addEventListener("mousedown", (ev)=>{
        dragging = true;
        rect = aimCanvas.getBoundingClientRect();
        const p = normFromPoint(ev.clientX, ev.clientY);
        queueAim(p.dx, p.dy);
      });

      window.addEventListener("mousemove", (ev)=>{
        if (!dragging) return;
        const p = normFromPoint(ev.clientX, ev.clientY);
        queueAim(p.dx, p.dy);
      });

      window.addEventListener("mouseup", async ()=>{
        if (!dragging) return;
        dragging = false;
        await fireNow();
      });
    }

    aimWrap.appendChild(aimCanvas);

    if (shotFired){
      const dock = document.createElement("div");
      dock.className = "powerDock";

      const powerBtn = document.createElement("button");
      powerBtn.className = "powerOnly";
      powerBtn.innerHTML = `<img src="${IMG.POWER}" alt="">`;
      powerBtn.onclick = ()=> apiSend(`${player}_POWER`);

      dock.appendChild(powerBtn);
      aimWrap.appendChild(dock);
    }

    layer.appendChild(aimWrap);
  }

  function renderWaiting(){
    const layer = clearLayer();

    const wrap = document.createElement("div");
    wrap.className = "waitingWrap";

    const top = document.createElement("div");
    top.className = "topIcons";

    const left = document.createElement("div");
    left.className = "iconRow";
    left.appendChild(makeImageButton(IMG.HOME, ()=> apiSend(`${player}_HOME`), "iconBtn"));
    top.appendChild(left);

    const right = document.createElement("div");
    right.className = "iconRow";
    right.appendChild(makeImageButton(IMG.RESTART, ()=> apiSend(`${player}_RESTART`), "iconBtn circle"));
    right.appendChild(makeImageButton(IMG.EXIT, ()=> apiSend(`${player}_EXIT`), "iconBtn circle"));
    top.appendChild(right);

    wrap.appendChild(top);

    const panel = document.createElement("div");
    panel.className = "waitingPanel";

    const bg = document.createElement("img");
    bg.className = "waitingBg";
    bg.src = IMG.BG_WAIT;
    panel.appendChild(bg);

    const grid = document.createElement("div");
    grid.className = "waitingGrid";

    [IMG.WAIT1, IMG.WAIT2, IMG.WAIT3, IMG.WAIT4].forEach(src=>{
      const c = document.createElement("div");
      c.className = "waitCard";
      c.innerHTML = `<img src="${src}" alt="">`;
      grid.appendChild(c);
    });

    panel.appendChild(grid);
    wrap.appendChild(panel);

    layer.appendChild(wrap);
    addFooter(layer, "WAITING");
  }

  function renderLevel(){
    if (!isCurrentPlayerActive() && shotFired){
      renderWaiting();
      return;
    }

    if (selectedSlot === null){
      renderCharacterSelectInLevel();
      return;
    }

    if (!shotFired){
      renderAimStage();
      return;
    }

    if (isCurrentPlayerActive()){
      renderAimStage();
      return;
    }

    renderWaiting();
  }

  function render(){
    const stage = normalizeStage(lastState.stage);

    applyTopSelection();
    updateTopVisibility(stage);
    $("screenBg").src = bgForMain(stage);

    if (stage === "start" || stage === "trailer"){
      selectedSlot = null;
      shotFired = false;
      renderStart(stage);
      return;
    }

    if (stage === "select"){
      selectedSlot = null;
      shotFired = false;
      renderLevelSelect();
      return;
    }

    if (stage === "level"){
      renderLevel();
      return;
    }

    renderStart(stage);
  }

  async function tick(){
    await apiGetState();

    const act = (lastState.active || "").trim().toUpperCase();
    if (act && act !== player && shotFired){
      // queda waiting mientras el otro esté activo
    }

    render();
  }

  loadPersisted();
  render();
  tick();
  setInterval(tick, 350);
</script>
</body>
</html>
