<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Angry Remote</title>

  <style>
    :root{
      --mint-0:#e7fff5;
      --mint-1:#c9ffe9;
      --mint-2:#a7f7d7;

      --vio-0:#f3efff;
      --vio-1:#cbbcff;
      --vio-2:#9b83ff;
      --vio-3:#5b3dd9;
      --vio-4:#2a1366;
      --vio-5:#120627;

      --ink: rgba(12,6,30,.92);

      --radius: 18px;
      --gap: 12px;

      --btn-h: 68px;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    *{box-sizing:border-box;}
    html,body{height:100%; margin:0; font-family:var(--font); color:var(--ink);}
    body{
      background: linear-gradient(180deg, var(--mint-0) 0%, var(--mint-1) 52%, var(--mint-2) 100%);
      display:flex;
      align-items:stretch;
      justify-content:center;
    }

    .wrap{
      width:min(920px, 100%);
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap: var(--gap);
    }

    .topbar{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.55);
      border: 1px solid rgba(18,6,39,.08);
      backdrop-filter: blur(8px);
      flex-wrap:wrap;
    }
    .codeBox{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
    .codeBox input{
      width: 140px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(18,6,39,.15);
      background: rgba(255,255,255,.75);
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      outline: none;
    }
    .pill{
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing:.05em;
      background: rgba(243,239,255,.9);
      border: 1px solid rgba(18,6,39,.10);
      user-select:none;
      white-space:nowrap;
    }

    .panel{
      flex: 1;
      min-height: 560px;
      border-radius: 26px;
      overflow:hidden;
      position:relative;
      border: 1px solid rgba(18,6,39,.10);
      background: rgba(255,255,255,.55);
      box-shadow: 0 12px 28px rgba(18,6,39,.10);
    }

    .bg{
      position:absolute; inset:0;
      background-size: cover;
      background-position: center;
      opacity: 1;
    }

    .panelContent{
      position:relative;
      height:100%;
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap: 12px;
    }

    .title{
      font-size: 18px;
      font-weight: 900;
      letter-spacing:.02em;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.60);
      border: 1px solid rgba(18,6,39,.10);
      width: fit-content;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top:auto;
    }
    @media (min-width:720px){
      .grid{ grid-template-columns: repeat(3, 1fr); }
    }

    .imgBtn{
      height: var(--btn-h);
      border-radius: 18px;
      border: 1px solid rgba(18,6,39,.18);
      background: rgba(255,255,255,.55);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 8px;
      cursor:pointer;
      user-select:none;
      transition: transform .06s ease, box-shadow .06s ease;
      box-shadow: 0 10px 20px rgba(18,6,39,.10);
    }
    .imgBtn:active{ transform: translateY(1px) scale(.995); box-shadow: 0 6px 14px rgba(18,6,39,.10); }
    .imgBtn img{
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      filter: drop-shadow(0 3px 6px rgba(18,6,39,.18));
      pointer-events:none;
    }

    /* Overlay de espera (cuando NO es tu turno en Level1) */
    .overlay{
      position:absolute;
      inset:0;
      display:none;
      z-index: 50;
    }
    .overlay.show{ display:block; }
    .overlay .bg{ filter: saturate(1.05) contrast(1.02); }
    .overlay .panelContent{ background: rgba(255,255,255,.15); }

    .hint{
      font-size: 12px;
      opacity: .95;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.60);
      border: 1px solid rgba(18,6,39,.10);
      width: fit-content;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="codeBox">
        <span class="pill" id="pillPlayer">P?</span>
        <span class="pill">SESSION</span>
        <input id="codeInput" placeholder="CULA" maxlength="12" />
        <button id="btnApplyCode" class="pill" style="cursor:pointer;">APLICAR</button>
        <span class="pill" id="pillStage">stage: ?</span>
        <span class="pill" id="pillTurn">turn: ?</span>
      </div>
      <div class="codeBox">
        <span class="pill" id="pillNet">net: ready</span>
      </div>
    </div>

    <!-- Panel único: cambia BG y botones según stage -->
    <section class="panel" id="mainPanel">
      <div class="bg" id="mainBg"></div>
      <div class="panelContent">
        <div class="title" id="mainTitle">REMOTE</div>

        <div class="grid" id="btnGrid"></div>

        <div class="hint" id="hintText">Abre P1 con ?p=1 y P2 con ?p=2</div>
      </div>

      <!-- Overlay espera (solo se usa en Level1 cuando NO es tu turno) -->
      <div class="overlay" id="waitOverlay">
        <div class="bg" id="waitBg"></div>
        <div class="panelContent">
          <div class="title">ESPERA (LINDA)</div>
          <div class="grid" id="waitGrid"></div>
          <div class="hint">Estás fuera de turno. Cuando sea tu turno vuelve el panel de Level1.</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    // ---------------- ASSETS helpers ----------------
    function enc(name){ return encodeURIComponent(name); }
    function stylePng(filename){ return "style/" + enc(filename); }
    function setBg(el, filename){
      el.style.backgroundImage = `url("${stylePng(filename)}")`;
    }
    function imgButton(cmd, filename, title){
      const b = document.createElement("button");
      b.className = "imgBtn";
      b.type = "button";
      b.dataset.cmd = cmd;
      b.title = title || cmd;

      const img = document.createElement("img");
      img.alt = title || cmd;
      img.src = stylePng(filename);

      b.appendChild(img);
      b.addEventListener("click", ()=>sendCommand(cmd));
      return b;
    }

    // ---------------- SESSION + PLAYER ----------------
    const codeInput = document.getElementById("codeInput");
    const btnApply = document.getElementById("btnApplyCode");
    const pillPlayer = document.getElementById("pillPlayer");
    const pillStage = document.getElementById("pillStage");
    const pillTurn  = document.getElementById("pillTurn");
    const pillNet   = document.getElementById("pillNet");

    const params = new URLSearchParams(location.search);
    let sessionCode = (params.get("code") || "").trim().toUpperCase();
    if(sessionCode) codeInput.value = sessionCode;

    // p=1 o p=2 (obligatorio para que cada teléfono sea un jugador)
    let player = (params.get("p") || params.get("player") || "").toString().trim();
    if(player !== "1" && player !== "2") player = "1"; // fallback seguro
    const myPlayerTag = (player === "1") ? "P1" : "P2";
    pillPlayer.textContent = myPlayerTag;

    btnApply.addEventListener("click", ()=>{
      sessionCode = (codeInput.value || "").trim().toUpperCase();
      const u = new URL(location.href);
      if(sessionCode) u.searchParams.set("code", sessionCode);
      u.searchParams.set("p", player);
      history.replaceState({}, "", u.toString());
      pillNet.textContent = "net: ready";
    });

    // ---------------- UI refs ----------------
    const mainBg = document.getElementById("mainBg");
    const mainTitle = document.getElementById("mainTitle");
    const btnGrid = document.getElementById("btnGrid");
    const hintText = document.getElementById("hintText");

    const waitOverlay = document.getElementById("waitOverlay");
    const waitBg = document.getElementById("waitBg");
    const waitGrid = document.getElementById("waitGrid");

    // ---------------- COMMAND SENDER (robusto) ----------------
    async function postJson(url, body){
      const res = await fetch(url, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(body)
      });
      if(!res.ok) throw new Error("HTTP " + res.status);
      return res;
    }

    async function sendCommand(cmd){
      if(!sessionCode){
        pillNet.textContent = "net: sin code";
        return;
      }
      const payload = { code: sessionCode, cmd };

      // endpoints posibles para no romper
      const endpoints = ["/api/cmd","/api/command","/api/send","/api/push"];
      for(const ep of endpoints){
        try{
          await postJson(ep, payload);
          pillNet.textContent = "net: ok";
          return;
        }catch(e){}
      }

      // fallback GET
      try{
        const u = `/api/cmd?code=${encodeURIComponent(sessionCode)}&cmd=${encodeURIComponent(cmd)}`;
        const r = await fetch(u);
        if(r.ok){ pillNet.textContent="net: ok"; return; }
      }catch(e){}

      pillNet.textContent = "net: error";
    }

    // ---------------- RENDER per STAGE ----------------
    // stage values esperados: "start", "select", "level1"
    // turn values esperados: "P1" / "P2"
    // trailer: true/false (para mostrar STOPTRAILER)
    let stage = "start";
    let turn = "P1";
    let trailerPlaying = false;

    function clearGrid(grid){
      while(grid.firstChild) grid.removeChild(grid.firstChild);
    }

    function renderStart(){
      setBg(mainBg, "BG P1.png"); // Start no tiene BG propio => usamos el del jugador (fijo)
      if(myPlayerTag === "P2") setBg(mainBg, "BG P2.png");

      mainTitle.textContent = `START (${myPlayerTag})`;
      hintText.textContent = "StartScene: PLAY / TRAILER / STOPTRAILER (si está reproduciendo) / EXIT";

      clearGrid(btnGrid);
      btnGrid.appendChild(imgButton("PLAY", "PLAY.png", "PLAY"));
      btnGrid.appendChild(imgButton("TRAILER", "TRAILER.png", "TRAILER"));

      if(trailerPlaying){
        // si no tenés STOP, usamos RESTART como icono (como venías usando)
        btnGrid.appendChild(imgButton("STOPTRAILER", "RESTART.png", "STOPTRAILER"));
      }

      btnGrid.appendChild(imgButton("EXIT", "EXIT.png", "EXIT"));

      waitOverlay.classList.remove("show");
    }

    function renderSelect(){
      setBg(mainBg, (myPlayerTag==="P1") ? "BG P1.png" : "BG P2.png");
      mainTitle.textContent = `LEVEL SELECT (${myPlayerTag})`;
      hintText.textContent = "LevelSelect: LEFT / RIGHT / PLAY / HOME / EXIT (sin Level1/2/3)";

      clearGrid(btnGrid);
      btnGrid.appendChild(imgButton("LEFT", "LEFT.png", "LEFT"));
      btnGrid.appendChild(imgButton("RIGHT", "RIGHT.png", "RIGHT"));
      btnGrid.appendChild(imgButton("PLAY", "PLAY.png", "PLAY"));
      btnGrid.appendChild(imgButton("HOME", "HOME.png", "HOME"));
      btnGrid.appendChild(imgButton("EXIT", "EXIT.png", "EXIT"));

      waitOverlay.classList.remove("show");
    }

    function renderLevel1(){
      setBg(mainBg, (myPlayerTag==="P1") ? "BG P1.png" : "BG P2.png");
      mainTitle.textContent = `LEVEL1 (${myPlayerTag})`;
      hintText.textContent = "Level1: personajes + HAT + HOME/RESTART/EXIT. Si no es tu turno: panel de espera LINDA.";

      // botones gameplay
      clearGrid(btnGrid);
      btnGrid.appendChild(imgButton(`${myPlayerTag}_SLOT0`, "OVEJITA.png", "OVEJITA"));
      btnGrid.appendChild(imgButton(`${myPlayerTag}_SLOT1`, "PATITO.png", "PATITO"));
      btnGrid.appendChild(imgButton(`${myPlayerTag}_SLOT2`, "CARPINCHITA.png", "CARPINCHITA"));
      btnGrid.appendChild(imgButton(`${myPlayerTag}_SLOT3`, "RITA.png", "RITA"));
      btnGrid.appendChild(imgButton(`${myPlayerTag}_SLOT4`, "VAQUITA PELUDA.png", "VAQUITA PELUDA"));
      btnGrid.appendChild(imgButton(`${myPlayerTag}_HAT`, "poder argentino.png", "PODER ARGENTINO"));

      btnGrid.appendChild(imgButton("HOME", "HOME.png", "HOME"));
      btnGrid.appendChild(imgButton("RESTART", "RESTART.png", "RESTART"));
      btnGrid.appendChild(imgButton("EXIT", "EXIT.png", "EXIT"));

      // overlay espera si NO es tu turno
      const myTurn = (turn === myPlayerTag);

      setBg(waitBg, "BG ESPERA.png");
      clearGrid(waitGrid);

      // Linda 1..4
      waitGrid.appendChild(imgButton("LINDA1", "LINDA 1.png", "LINDA1"));
      waitGrid.appendChild(imgButton("LINDA2", "LINDA 2.png", "LINDA2"));
      waitGrid.appendChild(imgButton("LINDA3", "LINDA 3.png", "LINDA3"));
      waitGrid.appendChild(imgButton("LINDA4", "LINDA 4.png", "LINDA4"));

      // opcional: HOME/EXIT en espera
      waitGrid.appendChild(imgButton("HOME", "HOME.png", "HOME"));
      waitGrid.appendChild(imgButton("EXIT", "EXIT.png", "EXIT"));

      if(myTurn) waitOverlay.classList.remove("show");
      else waitOverlay.classList.add("show");
    }

    function renderAll(){
      pillStage.textContent = "stage: " + stage;
      pillTurn.textContent = "turn: " + turn;

      if(stage === "start") renderStart();
      else if(stage === "select") renderSelect();
      else if(stage === "level1") renderLevel1();
      else renderStart();
    }

    // ---------------- STATE POLLING ----------------
    // Intentamos leer estado del server. Si no existe, NO rompe: se queda en start.
    async function tryFetchState(){
      if(!sessionCode) return;

      const urls = [
        `/api/state?code=${encodeURIComponent(sessionCode)}`,
        `/api/presence?code=${encodeURIComponent(sessionCode)}`
      ];

      for(const u of urls){
        try{
          const r = await fetch(u, { cache:"no-store" });
          if(!r.ok) continue;
          const j = await r.json();

          // Aceptamos varios nombres para no romper:
          // stage: "start"|"select"|"level1"
          const st = (j.stage || (j.presence && j.presence.stage) || "").toString().toLowerCase();
          if(st.includes("start")) stage = "start";
          else if(st.includes("select")) stage = "select";
          else if(st.includes("level1") || st === "level") stage = "level1";

          // turn: "P1"|"P2"
          const t = (j.turn || j.currentTurn || j.activePlayer || j.player || (j.presence && j.presence.turn) || "").toString().toUpperCase();
          if(t === "P1" || t === "P2") turn = t;

          // trailerPlaying bool
          const tr = (j.trailerPlaying ?? j.trailer ?? (j.presence && j.presence.trailerPlaying));
          if(typeof tr === "boolean") trailerPlaying = tr;

          renderAll();
          return;
        }catch(e){}
      }
    }

    // Inicial
    renderAll();
    setInterval(tryFetchState, 500);
  </script>
</body>
</html>
