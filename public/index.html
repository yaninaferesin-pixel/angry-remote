<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Angry Remote</title>

  <style>
    @font-face {
      font-family: "MonsterChew";
      src: url("/Font/CCThisManThisMonster W00 Chew/CCThisManThisMonster W00 Chew.ttf") format("truetype");
      font-display: swap;
    }

    :root{
      --vio-0:#f2e6ff;
      --vio-1:#dcbcff;
      --vio-2:#cd86ff;
      --vio-3:#b253ff;
      --vio-4:#5a1fd6;
      --ink:#142016;
      --shadow:0 12px 26px rgba(0,0,0,.14);
      --stroke:rgba(30,60,40,.12);
      --safe-bottom:max(16px, env(safe-area-inset-bottom));
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      min-height:100%;
      background: linear-gradient(180deg, var(--vio-0), var(--vio-1), var(--vio-2), var(--vio-4));
      color:var(--ink);
      font-family:"MonsterChew", system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior:none;
    }

    body{
      display:flex;
      justify-content:center;
    }

    .app{
      width:min(540px, 100%);
      min-height:100vh;
      padding:10px 10px var(--safe-bottom);
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .hidden{ display:none !important; }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-radius:18px;
      background:rgba(255,255,255,.72);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
    }

    .topLeft{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .playerChip{
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,.82);
      border:1px solid rgba(0,0,0,.08);
      min-width:54px;
      height:44px;
      padding:0 14px;
      font:inherit;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,.08);
    }

    .playerChip.active{
      background: linear-gradient(180deg, var(--vio-0), var(--vio-2));
      color:#241339;
      border-color: rgba(90,31,214,.22);
    }

    .sessionMini{
      display:flex;
      align-items:center;
      gap:8px;
      flex:1;
      justify-content:flex-end;
    }

    .sessionMini input{
      width:118px;
      height:42px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.88);
      padding:0 12px;
      text-transform:uppercase;
      font:inherit;
      font-size:18px;
      outline:none;
    }

    .miniBtn{
      border:none;
      border-radius:999px;
      height:42px;
      padding:0 18px;
      font:inherit;
      font-size:18px;
      cursor:pointer;
      color:#241339;
      background: linear-gradient(180deg, var(--vio-0), var(--vio-2));
      border:1px solid rgba(90,31,214,.20);
      box-shadow:0 8px 14px rgba(0,0,0,.10);
    }

    .statusRow{
      display:flex;
      gap:8px;
      margin-top:8px;
    }

    .statusBox{
      flex:1;
      min-height:46px;
      padding:10px 12px;
      border-radius:16px;
      background:rgba(255,255,255,.68);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:17px;
      line-height:1;
    }

    .screen{
      position:relative;
      flex:1;
      min-height:76vh;
      border-radius:28px;
      overflow:hidden;
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      background:rgba(255,255,255,.22);
    }

    .bg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:.98;
      pointer-events:none;
      user-select:none;
    }

    .layer{
      position:relative;
      z-index:2;
      height:100%;
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:14px;
    }

    .footerTitle{
      margin-top:auto;
      text-align:center;
      font-size:50px;
      line-height:.9;
      color:#f7f7f7;
      text-shadow:
        0 4px 0 rgba(0,0,0,.08),
        0 10px 18px rgba(0,0,0,.18);
      user-select:none;
      pointer-events:none;
    }

    .footerTitle.compact{
      font-size:42px;
      opacity:.92;
    }

    .topIcons{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .iconRow{
      display:flex;
      gap:12px;
      align-items:center;
    }

    .imgOnlyBtn{
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.12));
      display:flex;
      align-items:center;
      justify-content:center;
      touch-action:manipulation;
    }

    .imgOnlyBtn img{
      display:block;
      object-fit:contain;
      pointer-events:none;
      user-select:none;
    }

    .imgOnlyBtn.icon img{
      width:72px;
      height:72px;
    }

    .imgOnlyBtn.medium img{
      height:92px;
      width:auto;
    }

    .imgOnlyBtn.small img{
      height:72px;
      width:auto;
    }

    .centerStage{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:26px;
    }

    .charLayout{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:18px;
      justify-content:flex-start;
      padding-top:4px;
    }

    .specialTop{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:84px;
    }

    .charArea{
      flex:1;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px 18px;
      align-content:center;
      justify-items:center;
      padding:0 4px;
    }

    .charBtn{
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.12));
      touch-action:manipulation;
    }

    .charBtn img{
      max-width:142px;
      max-height:122px;
      object-fit:contain;
      pointer-events:none;
      user-select:none;
    }

    .specialPower{
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.12));
      touch-action:manipulation;
    }

    .specialPower img{
      width:88px;
      height:88px;
      object-fit:contain;
      pointer-events:none;
      user-select:none;
    }

    .aimMode{
      height:100%;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .aimCanvas{
      position:relative;
      flex:1;
      min-height:70vh;
      touch-action:none;
      background:transparent;
      overflow:hidden;
      border-radius:28px;
    }

    .aimCanvas img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:center center;
      pointer-events:none;
      user-select:none;
      z-index:1;
    }

    .aimHint{
      position:absolute;
      left:14px;
      top:14px;
      padding:10px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.72);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      font-size:18px;
      z-index:5;
    }

    .powerScreen{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:24px;
      min-height:68vh;
    }

    .powerBig{
      border:none;
      background:transparent;
      cursor:pointer;
      padding:0;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.14));
      touch-action:manipulation;
    }

    .powerBig img{
      width:min(72vw, 280px);
      height:auto;
      object-fit:contain;
      pointer-events:none;
      user-select:none;
    }

    .powerLabel{
      padding:10px 16px;
      border-radius:14px;
      background:rgba(255,255,255,.74);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      font-size:22px;
      text-align:center;
    }

    .waitingWrap{
      height:100%;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .waitingStage{
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      min-height:70vh;
    }

    .lindaGrid{
      flex:1;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
      align-content:center;
      justify-items:center;
      padding:10px 12px 4px;
    }

    .lindaBtn{
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.10));
      touch-action:manipulation;
    }

    .lindaBtn img{
      width:100%;
      max-width:170px;
      object-fit:contain;
      pointer-events:none;
      user-select:none;
    }

    @media (max-width:440px){
      .footerTitle{ font-size:42px; }
      .imgOnlyBtn.icon img{ width:66px; height:66px; }
      .imgOnlyBtn.medium img{ height:82px; }
      .imgOnlyBtn.small img{ height:66px; }
      .charBtn img{ max-width:122px; max-height:106px; }
      .specialPower img{ width:78px; height:78px; }
      .powerBig img{ width:min(76vw, 250px); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="topShell">
      <div id="topbar" class="topbar">
        <div class="topLeft">
          <button id="p1Btn" class="playerChip">P1</button>
          <button id="p2Btn" class="playerChip">P2</button>
        </div>

        <div class="sessionMini">
          <input id="codeInput" maxlength="12" placeholder="CULA" />
          <button id="applyBtn" class="miniBtn">APLICAR</button>
        </div>
      </div>

      <div id="statusRow" class="statusRow">
        <div class="statusBox">stage: <span id="stageText" style="margin-left:6px;">-</span></div>
        <div class="statusBox">active: <span id="activeText" style="margin-left:6px;">-</span></div>
        <div class="statusBox">net: <span id="netText" style="margin-left:6px;">...</span></div>
      </div>
    </div>

    <div class="screen" id="screen">
      <img id="screenBg" class="bg" alt="" />
      <div id="layer" class="layer"></div>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);

  let player = "P1";
  let code = "CULA";
  let lastState = {
    stage: "start",
    active: "",
    ts: 0,
    playersCount: null
  };
  let netOk = false;

  let selectedSlot = null;
  let shotFired = false;
  let localPhase = "select";
  let consumedSlots = new Set();
  let resolveTimer = null;
  let powerGraceUntil = 0;

  let isDraggingRemote = false;
  let lastRenderedStage = "";
  let lastRenderedActive = "";
  let lastRenderedPhase = "";

  let seenActivePlayers = new Set();
  let persistedLoaded = false;

  const POWER_GRACE_MS = 7000;

  // MÁS FLUIDO / MÁS ÁNGULO
  const AIM_CFG = {
    starX: 0.505,
    starY: 0.255,
    rangeX: 0.035,
    rangeY: 0.035
  };

  const IMG = {
    BG_WAIT: "/style/BG ESPERA.png?v=5",
    BG_P1: "/style/BG P1.png?v=5",
    BG_P2: "/style/BG P2.png?v=5",
    SLINGSHOT: "/style/SLINGSHOT.png?v=5",

    PLAY: "/style/PLAY.png?v=5",
    TRAILER: "/style/TRAILER.png?v=5",
    RESTART: "/style/RESTART.png?v=5",
    EXIT: "/style/EXIT.png?v=5",
    HOME: "/style/HOME.png?v=5",
    LEFT: "/style/LEFT.png?v=5",
    RIGHT: "/style/RIGHT.png?v=5",

    OVEJITA: "/style/OVEJITA.png?v=5",
    PATITO: "/style/PATITO.png?v=5",
    CARPINCHITA: "/style/CARPINCHITA.png?v=5",
    RITA: "/style/RITA.png?v=5",
    VAQUITA_PELUDA: "/style/VAQUITA PELUDA.png?v=5",
    HAT: "/style/poder argentino.png?v=5",
    HAT_USED: "/style/poder argentino usado.png?v=2",

    ANGRY_OVEJITA: "/style/ANGRY OVEJITA.png?v=5",
    ANGRY_PATITO: "/style/ANGRY PATITO.png?v=5",
    ANGRY_CARPINCHITA: "/style/ANGRY CARPINCHITA.png?v=5",
    ANGRY_RITA: "/style/ANGRY RITA.png?v=5",
    ANGRY_VAQUITA_PELUDA: "/style/ANGRY VAQUITA PELUDA.png?v=5",

    LINDA1: "/style/LINDA 1.png?v=5",
    LINDA2: "/style/LINDA 2.png?v=5",
    LINDA3: "/style/LINDA 3.png?v=5",
    LINDA4: "/style/LINDA 4.png?v=5",
  };

  function dbg(...args){
    console.log("[REMOTE]", ...args);
  }

  function getPlayerFromUrl(){
    const u = new URL(location.href);
    const p = (u.searchParams.get("p") || u.searchParams.get("player") || "").trim();
    if (p === "2") return "P2";
    if (p === "1") return "P1";
    return "";
  }

  function saveLocalLevelState(){
    try{
      localStorage.setItem("angry_player", player);
      localStorage.setItem("angry_code", code);
      localStorage.setItem("angry_selectedSlot", selectedSlot === null ? "" : String(selectedSlot));
      localStorage.setItem("angry_shotFired", shotFired ? "1" : "0");
      localStorage.setItem("angry_localPhase", localPhase);
      localStorage.setItem("angry_consumedSlots", JSON.stringify(Array.from(consumedSlots)));
      localStorage.setItem("angry_seenPlayers", JSON.stringify(Array.from(seenActivePlayers)));
      localStorage.setItem("angry_powerGraceUntil", String(powerGraceUntil || 0));
    }catch(e){}
  }

  function loadPersisted(){
    player = getPlayerFromUrl() || localStorage.getItem("angry_player") || "P1";
    code = (new URL(location.href)).searchParams.get("code") || localStorage.getItem("angry_code") || "CULA";
    $("codeInput").value = code;

    try{
      const storedSelected = localStorage.getItem("angry_selectedSlot");
      selectedSlot = storedSelected === null || storedSelected === "" ? null : (storedSelected === "hat" ? "hat" : Number(storedSelected));

      shotFired = localStorage.getItem("angry_shotFired") === "1";

      const storedPhase = localStorage.getItem("angry_localPhase");
      if (storedPhase === "select" || storedPhase === "aim" || storedPhase === "power" || storedPhase === "resolving"){
        localPhase = storedPhase;
      }

      const storedConsumed = JSON.parse(localStorage.getItem("angry_consumedSlots") || "[]");
      consumedSlots = new Set(Array.isArray(storedConsumed) ? storedConsumed : []);

      const storedSeen = JSON.parse(localStorage.getItem("angry_seenPlayers") || "[]");
      seenActivePlayers = new Set(Array.isArray(storedSeen) ? storedSeen : []);

      powerGraceUntil = parseInt(localStorage.getItem("angry_powerGraceUntil") || "0", 10) || 0;
    }catch(e){
      selectedSlot = null;
      shotFired = false;
      localPhase = "select";
      consumedSlots = new Set();
      seenActivePlayers = new Set();
      powerGraceUntil = 0;
    }

    persistedLoaded = true;
  }

  function resetLevelLocalState(clearConsumed = false){
    selectedSlot = null;
    shotFired = false;
    localPhase = "select";
    powerGraceUntil = 0;
    isDraggingRemote = false;

    if (resolveTimer){
      clearTimeout(resolveTimer);
      resolveTimer = null;
    }

    if (clearConsumed){
      consumedSlots = new Set();
      seenActivePlayers = new Set();
    }

    saveLocalLevelState();
  }

  function setPlayer(p){
    player = p;
    localStorage.setItem("angry_player", player);
    resetLevelLocalState(false);
    render(true);
  }

  $("p1Btn").onclick = ()=> setPlayer("P1");
  $("p2Btn").onclick = ()=> setPlayer("P2");

  $("applyBtn").onclick = ()=>{
    code = ($("codeInput").value || "").trim().toUpperCase() || "CULA";
    localStorage.setItem("angry_code", code);
    render(true);
  };

  function extractPlayersCount(j){
    if (!j || typeof j !== "object") return null;

    if (typeof j.playersCount === "number") return j.playersCount;
    if (typeof j.playerCount === "number") return j.playerCount;
    if (typeof j.connectedPlayers === "number") return j.connectedPlayers;
    if (typeof j.onlinePlayers === "number") return j.onlinePlayers;
    if (Array.isArray(j.players)) return j.players.length;
    if (Array.isArray(j.connected)) return j.connected.length;
    if (Array.isArray(j.online)) return j.online.length;

    return null;
  }

  async function apiGetState(){
    try{
      const r = await fetch(`/api/state?code=${encodeURIComponent(code)}`, { cache:"no-store" });
      const j = await r.json();

      if (j && j.ok){
        lastState = {
          stage: j.stage || "start",
          active: j.active || "",
          ts: j.ts || 0,
          playersCount: extractPlayersCount(j)
        };

        const act = (lastState.active || "").trim().toUpperCase();
        if (act === "P1" || act === "P2"){
          seenActivePlayers.add(act);
        }

        netOk = true;
        saveLocalLevelState();
      } else {
        netOk = false;
      }
    }catch(e){
      netOk = false;
    }
  }

  async function apiSend(cmd){
    dbg("SEND", cmd);
    try{
      await fetch("/api/send", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ code, cmd })
      });
      netOk = true;
    }catch(e){
      console.error("[REMOTE] SEND ERROR", cmd, e);
      netOk = false;
    }
  }

  function bindPress(el, fn){
    let fired = false;

    const run = async (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      if (fired) return;
      fired = true;
      try{
        await fn();
      } finally {
        setTimeout(() => { fired = false; }, 160);
      }
    };

    el.addEventListener("touchstart", run, { passive:false });
    el.addEventListener("mousedown", run);
    el.addEventListener("click", run);
    return el;
  }

  function normalizeStage(s){
    s = (s || "").toLowerCase().trim();
    if (s.includes("trailer")) return "trailer";
    if (s.includes("select")) return "select";
    if (s.includes("level")) return "level";
    if (s.includes("start")) return "start";
    if (s.includes("end") || s.includes("final") || s.includes("result") || s.includes("victory") || s.includes("win")) return "end";
    return "start";
  }

  function isCurrentPlayerActive(){
    const act = (lastState.active || "").trim().toUpperCase();
    if (!act) return true;
    return act === player;
  }

  function hasTwoPlayers(){
    if (typeof lastState.playersCount === "number"){
      return lastState.playersCount >= 2;
    }

    if (seenActivePlayers.has("P1") && seenActivePlayers.has("P2")){
      return true;
    }

    return false;
  }

  function shouldKeepPowerVisibleDespiteTurnChange(){
    return shotFired && selectedSlot !== null && selectedSlot !== "hat" && Date.now() < powerGraceUntil;
  }

  function bgForMain(){
    return player === "P2" ? IMG.BG_P2 : IMG.BG_P1;
  }

  function updateTopVisibility(stage){
    const topShell = $("topShell");
    if (stage === "start" || stage === "trailer"){
      topShell.classList.remove("hidden");
    } else {
      topShell.classList.add("hidden");
    }
  }

  function applyTopSelection(){
    $("p1Btn").classList.toggle("active", player === "P1");
    $("p2Btn").classList.toggle("active", player === "P2");
    $("stageText").textContent = normalizeStage(lastState.stage);
    $("activeText").textContent = lastState.active || "-";
    $("netText").textContent = netOk ? "ok" : "offline";
  }

  function clearLayer(){
    const layer = $("layer");
    while (layer.firstChild) layer.removeChild(layer.firstChild);
    return layer;
  }

  function makeImageButton(src, fn, extraClass=""){
    const b = document.createElement("button");
    b.className = `imgOnlyBtn ${extraClass}`.trim();
    b.innerHTML = `<img src="${src}" alt="">`;
    bindPress(b, fn);
    return b;
  }

  function footerText(){
    return player === "P1" ? "PLAYER 1" : "PLAYER 2";
  }

  function addFooter(layer, textOverride, compact=false){
    const ft = document.createElement("div");
    ft.className = "footerTitle" + (compact ? " compact" : "");
    ft.textContent = textOverride || footerText();
    layer.appendChild(ft);
  }

  function getAngryImageForSlot(slot){
    switch(slot){
      case 0: return IMG.ANGRY_OVEJITA;
      case 1: return IMG.ANGRY_PATITO;
      case 2: return IMG.ANGRY_CARPINCHITA;
      case 3: return IMG.ANGRY_RITA;
      case 4: return IMG.ANGRY_VAQUITA_PELUDA;
      default: return IMG.PLAY;
    }
  }

  function markConsumed(slot){
    if (typeof slot === "number"){
      consumedSlots.add(slot);
      saveLocalLevelState();
    }
  }

  function isConsumed(slot){
    return consumedSlots.has(slot);
  }

  function enterResolveThenAdvance(delayMs){
    localPhase = "resolving";
    saveLocalLevelState();
    render(true);

    if (resolveTimer) clearTimeout(resolveTimer);

    resolveTimer = setTimeout(()=>{
      resolveTimer = null;

      if (hasTwoPlayers()){
        localPhase = "resolving";
      } else {
        selectedSlot = null;
        shotFired = false;
        localPhase = "select";
        powerGraceUntil = 0;
      }

      saveLocalLevelState();
      render(true);
    }, delayMs);
  }

  function renderStart(stage){
    const layer = clearLayer();

    const center = document.createElement("div");
    center.className = "centerStage";

    center.appendChild(makeImageButton(IMG.PLAY, async ()=> {
      resetLevelLocalState(true);
      await apiSend(`${player}_PLAY`);
    }, "medium"));

    center.appendChild(makeImageButton(IMG.TRAILER, ()=> apiSend(`${player}_TRAILER`), "medium"));
    center.appendChild(makeImageButton(IMG.EXIT, ()=> apiSend(`${player}_EXIT`), "small"));

    layer.appendChild(center);
    addFooter(layer);
  }

  function renderLevelSelect(){
    const layer = clearLayer();

    const top = document.createElement("div");
    top.className = "topIcons";

    const left = document.createElement("div");

  function renderAimStage(){
    const layer = clearLayer();

    const top = document.createElement("div");
    top.className = "topIcons";

    const left = document.createElement("div");
    left.className = "iconRow";
    left.appendChild(makeImageButton(IMG.HOME, ()=> apiSend(`${player}_HOME`), "icon"));
    top.appendChild(left);

    const right = document.createElement("div");
    right.className = "iconRow";
    right.appendChild(makeImageButton(IMG.EXIT, ()=> apiSend(`${player}_EXIT`), "icon"));
    right.appendChild(makeImageButton(IMG.RESTART, async ()=> {
      resetLevelLocalState(true);
      await apiSend(`${player}_RESTART`);
    }, "icon"));
    top.appendChild(right);

    layer.appendChild(top);

    const aimWrap = document.createElement("div");
    aimWrap.className = "aimMode";

    const aimCanvas = document.createElement("div");
    aimCanvas.className = "aimCanvas";

    const aimBg = document.createElement("img");
    aimBg.src = IMG.SLINGSHOT;
    aimCanvas.appendChild(aimBg);

    const badge = document.createElement("div");
    badge.className = "aimHint";
    badge.textContent = "SLINGSHOT";
    aimCanvas.appendChild(badge);

    let rect = null;
    let lastAim = { dx: 0, dy: 0 };
    let aimDirty = false;
    let aimSending = false;
    let rafPending = false;

    function fmt(n){
      return (Math.round(n * 10000) / 10000).toString();
    }

    function refreshRect(){
      rect = aimCanvas.getBoundingClientRect();
    }

    function normFromPoint(screenX, screenY){
      if (!rect) refreshRect();

      const starX = rect.left + rect.width * AIM_CFG.starX;
      const starY = rect.top + rect.height * AIM_CFG.starY;

      const dx = (screenX - starX) / (rect.width * AIM_CFG.rangeX);
      const dy = (screenY - starY) / (rect.height * AIM_CFG.rangeY);

      return {
        dx: Math.max(-1, Math.min(1, dx)),
        dy: Math.max(-1, Math.min(1, dy)),
      };
    }

    async function flushAimLoop(){
      if (aimSending) return;
      aimSending = true;

      while (aimDirty) {
        aimDirty = false;
        await apiSend(`${player}_DRAG ${fmt(lastAim.dx)} ${fmt(lastAim.dy)}`);
      }

      aimSending = false;
    }

    function queueAim(dx, dy){
      lastAim = { dx, dy };
      aimDirty = true;

      if (!rafPending) {
        rafPending = true;
        requestAnimationFrame(() => {
          rafPending = false;
          flushAimLoop();
        });
      }
    }

    async function fireNow(){
      await flushAimLoop();
      await apiSend(`${player}_DRAG_END ${fmt(lastAim.dx)} ${fmt(lastAim.dy)}`);

      shotFired = true;
      powerGraceUntil = Date.now() + POWER_GRACE_MS;
      isDraggingRemote = false;

      if (typeof selectedSlot === "number"){
        markConsumed(selectedSlot);
      }

      if (selectedSlot === "hat"){
        consumedSlots.add("hat");
        saveLocalLevelState();
        enterResolveThenAdvance(1400);
      } else {
        localPhase = "power";
        saveLocalLevelState();
        render(true);
      }
    }

    async function startDrag(screenX, screenY){
      isDraggingRemote = true;
      refreshRect();

      const p = normFromPoint(screenX, screenY);
      lastAim = p;

      await apiSend(`${player}_DRAG_BEGIN ${fmt(p.dx)} ${fmt(p.dy)}`);
      queueAim(p.dx, p.dy);
    }

    function moveDrag(screenX, screenY){
      if (!isDraggingRemote) return;

      const p = normFromPoint(screenX, screenY);
      queueAim(p.dx, p.dy);
    }

    async function endDrag(){
      if (!isDraggingRemote) return;
      await fireNow();
    }

    refreshRect();
    window.addEventListener("resize", refreshRect);

    aimCanvas.addEventListener("touchstart", async (ev)=>{
      ev.preventDefault();
      const t = ev.touches && ev.touches[0];
      if (!t) return;
      await startDrag(t.clientX, t.clientY);
    }, { passive:false });

    window.addEventListener("touchmove", (ev)=>{
      if (!isDraggingRemote) return;
      const t = ev.touches && ev.touches[0];
      if (!t) return;
      ev.preventDefault();
      moveDrag(t.clientX, t.clientY);
    }, { passive:false });

    window.addEventListener("touchend", async (ev)=>{
      if (!isDraggingRemote) return;
      ev.preventDefault();
      await endDrag();
    }, { passive:false });

    window.addEventListener("touchcancel", async ()=>{
      if (!isDraggingRemote) return;
      await endDrag();
    }, { passive:false });

    aimCanvas.addEventListener("mousedown", async (ev)=>{
      await startDrag(ev.clientX, ev.clientY);
    });

    window.addEventListener("mousemove", (ev)=>{
      if (!isDraggingRemote) return;
      moveDrag(ev.clientX, ev.clientY);
    });

    window.addEventListener("mouseup", async ()=>{
      if (!isDraggingRemote) return;
      await endDrag();
    });

    aimWrap.appendChild(aimCanvas);
    layer.appendChild(aimWrap);
  }

  function renderEndStage(){

    center.appendChild(label);

    const navRow = document.createElement("div");

    navRow.style.flexWrap = "wrap";

    navRow.appendChild(makeImageButton(IMG.PLAY, async ()=> {
      resetLevelLocalState(true);
      await apiSend(`${player}_NEXTLEVEL`);
    }, "icon"));

    navRow.appendChild(makeImageButton(IMG.RESTART, async ()=> {
      resetLevelLocalState(true);
      await apiSend(`${player}_RESTART`);
    }, "icon"));

  function renderLevel(){
    const active = isCurrentPlayerActive();
    const keepPower = shouldKeepPowerVisibleDespiteTurnChange();

    if (!active && !keepPower){
      selectedSlot = null;
      shotFired = false;
      localPhase = "resolving";
      saveLocalLevelState();
      renderWaiting();
      return;
    }

    $("screenBg").src = bgForMain();

    if (selectedSlot === null || localPhase === "select"){
      localPhase = "select";
      saveLocalLevelState();
      renderCharacterSelectInLevel();
      return;
    }

    if (!shotFired && localPhase === "aim"){
      renderAimStage();
      return;
    }

    if (localPhase === "power" || keepPower){
      renderPowerStage();
      return;
    }

    if (localPhase === "resolving"){
      if (!hasTwoPlayers()){
        selectedSlot = null;
        shotFired = false;
        localPhase = "select";
        powerGraceUntil = 0;
        saveLocalLevelState();
        renderCharacterSelectInLevel();
        return;
      }

      if (Date.now() < powerGraceUntil){
        renderPowerStage();
        return;
      }

      renderWaiting();
      return;
    }

    renderCharacterSelectInLevel();
  }

  function render(force = false){
    const stage = normalizeStage(lastState.stage);

    applyTopSelection();
    updateTopVisibility(stage);

    if (!force && isDraggingRemote && stage === "level" && localPhase === "aim"){
      return;
    }

    if (!force){
      const active = (lastState.active || "").trim().toUpperCase();
      if (
        stage === lastRenderedStage &&
        active === lastRenderedActive &&
        localPhase === lastRenderedPhase
      ){
        return;
      }
    }

    lastRenderedStage = stage;
    lastRenderedActive = (lastState.active || "").trim().toUpperCase();
    lastRenderedPhase = localPhase;

    if (stage === "start" || stage === "trailer"){
      $("screenBg").src = bgForMain();
      resetLevelLocalState(false);
      renderStart(stage);
      return;
    }

    if (stage === "select"){
      $("screenBg").src = bgForMain();
      resetLevelLocalState(true);
      renderLevelSelect();
      return;
    }

    if (stage === "level"){
      renderLevel();
      return;
    }

    if (stage === "end"){
      $("screenBg").src = bgForMain();
      renderEndStage();
      return;
    }

    $("screenBg").src = bgForMain();
    resetLevelLocalState(false);
    renderStart(stage);
  }

  async function tick(){
    await apiGetState();

    if (isDraggingRemote && normalizeStage(lastState.stage) === "level" && localPhase === "aim"){
      applyTopSelection();
      updateTopVisibility("level");
      return;
    }

    render(false);
  }

  loadPersisted();

  if (!persistedLoaded){
    resetLevelLocalState(false);
  }

  render(true);
  tick();
  setInterval(tick, 180);
</script>
