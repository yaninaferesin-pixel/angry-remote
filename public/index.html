<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Angry Remote</title>

  <!-- Tipografía: si NO podés usar Adobe Fonts, dejé fallback seguro.
       Si tenés Adobe Fonts kit (script), lo pegás acá arriba y cambiás --font a esa familia. -->
  <style>
    :root{
      --mint-0:#e7fff5;
      --mint-1:#c9ffe9;
      --mint-2:#a7f7d7;

      --vio-0:#f3efff;
      --vio-1:#cbbcff;
      --vio-2:#9b83ff;
      --vio-3:#5b3dd9;
      --vio-4:#2a1366;
      --vio-5:#120627;

      --ink: rgba(12,6,30,.92);

      --radius: 18px;
      --gap: 12px;

      --btn-h: 64px;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    *{box-sizing:border-box;}
    html,body{height:100%; margin:0; font-family:var(--font); color:var(--ink);}
    body{
      background: linear-gradient(180deg, var(--mint-0) 0%, var(--mint-1) 45%, var(--mint-2) 100%);
      display:flex;
      align-items:stretch;
      justify-content:center;
    }

    .wrap{
      width:min(860px, 100%);
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap: var(--gap);
    }

    /* Header */
    .topbar{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.55);
      border: 1px solid rgba(18,6,39,.08);
      backdrop-filter: blur(8px);
    }
    .codeBox{
      display:flex;
      gap:8px;
      align-items:center;
    }
    .codeBox input{
      width: 140px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(18,6,39,.15);
      background: rgba(255,255,255,.75);
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      outline: none;
    }
    .pill{
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing:.04em;
      background: rgba(243,239,255,.9);
      border: 1px solid rgba(18,6,39,.10);
    }

    /* Panels */
    .panel{
      flex: 1;
      min-height: 520px;
      border-radius: 26px;
      overflow:hidden;
      position:relative;
      border: 1px solid rgba(18,6,39,.10);
      background: rgba(255,255,255,.55);
      box-shadow: 0 12px 28px rgba(18,6,39,.10);
    }
    .panel.hidden{display:none;}

    .bg{
      position:absolute; inset:0;
      background-size: cover;
      background-position: center;
      filter: saturate(1.05) contrast(1.02);
      opacity: 1;
    }
    .panelContent{
      position:relative;
      height:100%;
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap: 12px;
    }

    .title{
      font-size: 18px;
      font-weight: 900;
      letter-spacing:.02em;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.60);
      border: 1px solid rgba(18,6,39,.10);
      width: fit-content;
    }

    /* Buttons grid */
    .grid{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top:auto;
    }
    @media (min-width:720px){
      .grid{ grid-template-columns: repeat(3, 1fr); }
    }

    /* Image buttons (usa tus PNG del /public/style) */
    .imgBtn{
      height: var(--btn-h);
      border-radius: 18px;
      border: 1px solid rgba(18,6,39,.18);
      background: rgba(255,255,255,.55);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 8px;
      cursor:pointer;
      user-select:none;
      transition: transform .06s ease, box-shadow .06s ease, border-color .06s ease;
      box-shadow: 0 10px 20px rgba(18,6,39,.10);
    }
    .imgBtn:active{ transform: translateY(1px) scale(.995); box-shadow: 0 6px 14px rgba(18,6,39,.10); }
    .imgBtn img{
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      filter: drop-shadow(0 3px 6px rgba(18,6,39,.18));
      pointer-events:none;
    }

    /* Violet “soft” buttons (si querés algunos sin imagen) */
    .vioBtn{
      height: var(--btn-h);
      border-radius: 18px;
      border: 1px solid rgba(18,6,39,.18);
      background: linear-gradient(180deg, rgba(203,188,255,.95) 0%, rgba(155,131,255,.90) 55%, rgba(91,61,217,.92) 100%);
      color: white;
      font-weight: 900;
      letter-spacing:.06em;
      cursor:pointer;
      box-shadow: 0 10px 20px rgba(18,6,39,.12);
    }
    .vioBtn:active{ transform: translateY(1px); }

    .row{
      display:flex;
      gap: 10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .mini{
      height: 46px;
      border-radius: 14px;
      padding: 0 14px;
      font-weight: 900;
      letter-spacing:.04em;
    }

    .footerHint{
      font-size: 12px;
      opacity: .9;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.60);
      border: 1px solid rgba(18,6,39,.10);
      width: fit-content;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="codeBox">
        <span class="pill">SESSION</span>
        <input id="codeInput" placeholder="CULA" maxlength="12" />
        <button class="vioBtn mini" id="btnApplyCode">APLICAR</button>
      </div>
      <div class="row">
        <span class="pill" id="statusPill">offline</span>
      </div>
    </div>

    <!-- ===== Panel 0: Espera (IMPORTANTE) ===== -->
    <section class="panel" id="panelWait">
      <div class="bg" id="bgWait"></div>
      <div class="panelContent">
        <div class="title">ESPERA</div>

        <div class="row">
          <button class="imgBtn" data-cmd="TRAILER" title="Trailer">
            <img id="imgTRAILER" alt="TRAILER">
          </button>
          <button class="imgBtn" data-cmd="STOPTRAILER" title="Stop Trailer">
            <img id="imgRESTART" alt="STOPTRAILER">
          </button>
        </div>

        <div class="grid">
          <!-- Linda 1..4 (IMPORTANTE) -->
          <button class="imgBtn" data-cmd="LINDA1" title="Linda 1"><img id="imgLINDA1" alt="LINDA1"></button>
          <button class="imgBtn" data-cmd="LINDA2" title="Linda 2"><img id="imgLINDA2" alt="LINDA2"></button>
          <button class="imgBtn" data-cmd="LINDA3" title="Linda 3"><img id="imgLINDA3" alt="LINDA3"></button>
          <button class="imgBtn" data-cmd="LINDA4" title="Linda 4"><img id="imgLINDA4" alt="LINDA4"></button>

          <!-- Navegación básica -->
          <button class="imgBtn" data-cmd="HOME" title="Home"><img id="imgHOME" alt="HOME"></button>
          <button class="imgBtn" data-cmd="EXIT" title="Exit"><img id="imgEXIT" alt="EXIT"></button>
        </div>

        <div class="footerHint">Si no ves el juego, revisá el código arriba (SESSION).</div>
      </div>
    </section>

    <!-- ===== Panel 1: P1 ===== -->
    <section class="panel hidden" id="panelP1">
      <div class="bg" id="bgP1"></div>
      <div class="panelContent">
        <div class="title">P1</div>

        <!-- Personajes (nombres reales) -->
        <div class="grid">
          <button class="imgBtn" data-cmd="SLOT0" title="Ovejita"><img id="imgOVEJITA" alt="OVEJITA"></button>
          <button class="imgBtn" data-cmd="SLOT1" title="Patito"><img id="imgPATITO" alt="PATITO"></button>
          <button class="imgBtn" data-cmd="SLOT2" title="Carpinchita"><img id="imgCARPINCHITA" alt="CARPINCHITA"></button>
          <button class="imgBtn" data-cmd="SLOT3" title="Rita"><img id="imgRITA" alt="RITA"></button>
          <button class="imgBtn" data-cmd="SLOT4" title="Vaquita Peluda"><img id="imgVAQUITA" alt="VAQUITA PELUDA"></button>

          <!-- Poder Argentino -->
          <button class="imgBtn" data-cmd="HAT" title="Poder Argentino">
            <img id="imgHAT" alt="PODER ARGENTINO">
          </button>
        </div>

        <div class="row">
          <button class="imgBtn" data-cmd="HOME" title="Home"><img id="imgHOME2" alt="HOME"></button>
          <button class="imgBtn" data-cmd="EXIT" title="Exit"><img id="imgEXIT2" alt="EXIT"></button>
        </div>

        <div class="footerHint">P1: Elegí personaje y luego usá el slingshot (drag) desde el móvil.</div>
      </div>
    </section>

    <!-- ===== Panel 2: P2 ===== -->
    <section class="panel hidden" id="panelP2">
      <div class="bg" id="bgP2"></div>
      <div class="panelContent">
        <div class="title">P2</div>

        <!-- Si querés mismos personajes para P2, dejamos igual pero con prefijo P2_ -->
        <div class="grid">
          <button class="imgBtn" data-cmd="P2_SLOT0" title="Ovejita"><img id="imgOVEJITA2" alt="OVEJITA"></button>
          <button class="imgBtn" data-cmd="P2_SLOT1" title="Patito"><img id="imgPATITO2" alt="PATITO"></button>
          <button class="imgBtn" data-cmd="P2_SLOT2" title="Carpinchita"><img id="imgCARPINCHITA2" alt="CARPINCHITA"></button>
          <button class="imgBtn" data-cmd="P2_SLOT3" title="Rita"><img id="imgRITA2" alt="RITA"></button>
          <button class="imgBtn" data-cmd="P2_SLOT4" title="Vaquita Peluda"><img id="imgVAQUITA2" alt="VAQUITA PELUDA"></button>

          <button class="imgBtn" data-cmd="P2_HAT" title="Poder Argentino">
            <img id="imgHAT2" alt="PODER ARGENTINO">
          </button>
        </div>

        <div class="row">
          <button class="imgBtn" data-cmd="HOME" title="Home"><img id="imgHOME3" alt="HOME"></button>
          <button class="imgBtn" data-cmd="EXIT" title="Exit"><img id="imgEXIT3" alt="EXIT"></button>
        </div>

        <div class="footerHint">P2: Si no usás P2, este panel igual queda listo.</div>
      </div>
    </section>

    <!-- ===== Panel 3: LevelSelect (SIN Level1/2/3) ===== -->
    <section class="panel hidden" id="panelLevelSelect">
      <div class="bg" id="bgLevelSelect"></div>
      <div class="panelContent">
        <div class="title">LEVEL SELECT</div>

        <div class="grid">
          <button class="imgBtn" data-cmd="LEFT" title="Left"><img id="imgLEFT" alt="LEFT"></button>
          <button class="imgBtn" data-cmd="RIGHT" title="Right"><img id="imgRIGHT" alt="RIGHT"></button>
          <button class="imgBtn" data-cmd="PLAY" title="Play"><img id="imgPLAY" alt="PLAY"></button>

          <button class="imgBtn" data-cmd="HOME" title="Home"><img id="imgHOME4" alt="HOME"></button>
          <button class="imgBtn" data-cmd="EXIT" title="Exit"><img id="imgEXIT4" alt="EXIT"></button>
        </div>

        <div class="footerHint">Navegá con LEFT/RIGHT y entrá con PLAY.</div>
      </div>
    </section>

  </div>

  <script>
    // ---------- Assets helpers ----------
    function enc(name){ return encodeURIComponent(name); }
    function stylePng(filename){
      return "style/" + enc(filename);
    }
    function setImg(id, filename){
      const el = document.getElementById(id);
      if(!el) return;
      el.src = stylePng(filename);
    }
    function setBg(id, filename){
      const el = document.getElementById(id);
      if(!el) return;
      el.style.backgroundImage = `url("${stylePng(filename)}")`;
    }

    // ---------- Load your images (names EXACTOS como tus PNG en public/style) ----------
    // Backgrounds
    setBg("bgWait", "BG ESPERA.png");
    setBg("bgP1", "BG P1.png");
    setBg("bgP2", "BG P2.png");
    // Si no tenés BG específico para LevelSelect, usamos BG ESPERA o el que quieras.
    setBg("bgLevelSelect", "BG ESPERA.png");

    // Core nav buttons
    setImg("imgLEFT", "LEFT.png");
    setImg("imgRIGHT", "RIGHT.png");
    setImg("imgPLAY", "PLAY.png");
    setImg("imgHOME", "HOME.png");
    setImg("imgEXIT", "EXIT.png");
    setImg("imgHOME2", "HOME.png");
    setImg("imgEXIT2", "EXIT.png");
    setImg("imgHOME3", "HOME.png");
    setImg("imgEXIT3", "EXIT.png");
    setImg("imgHOME4", "HOME.png");
    setImg("imgEXIT4", "EXIT.png");

    // Trailer + stop
    setImg("imgTRAILER", "TRAILER.png");
    // Usamos RESTART.png como imagen del stop si no tenés STOPTRAILER.png
    setImg("imgRESTART", "RESTART.png");

    // Linda 1..4
    setImg("imgLINDA1", "LINDA 1.png");
    setImg("imgLINDA2", "LINDA 2.png");
    setImg("imgLINDA3", "LINDA 3.png");
    setImg("imgLINDA4", "LINDA 4.png");

    // Characters
    setImg("imgOVEJITA", "OVEJITA.png");
    setImg("imgPATITO", "PATITO.png");
    setImg("imgCARPINCHITA", "CARPINCHITA.png");
    setImg("imgRITA", "RITA.png");
    setImg("imgVAQUITA", "VAQUITA PELUDA.png");
    setImg("imgHAT", "poder argentino.png");

    // P2 copies (reusan mismas imágenes)
    setImg("imgOVEJITA2", "OVEJITA.png");
    setImg("imgPATITO2", "PATITO.png");
    setImg("imgCARPINCHITA2", "CARPINCHITA.png");
    setImg("imgRITA2", "RITA.png");
    setImg("imgVAQUITA2", "VAQUITA PELUDA.png");
    setImg("imgHAT2", "poder argentino.png");

    // ---------- Session / Code ----------
    const statusPill = document.getElementById("statusPill");
    const codeInput = document.getElementById("codeInput");
    const btnApply = document.getElementById("btnApplyCode");

    // lee ?code=
    const params = new URLSearchParams(location.search);
    let sessionCode = (params.get("code") || "").trim().toUpperCase();
    if(sessionCode) codeInput.value = sessionCode;

    btnApply.addEventListener("click", () => {
      sessionCode = (codeInput.value || "").trim().toUpperCase();
      if(!sessionCode) return;
      const url = new URL(location.href);
      url.searchParams.set("code", sessionCode);
      history.replaceState({}, "", url.toString());
      ping();
    });

    // ---------- Panels control (NO rompe si no hay endpoint de estado) ----------
    const panelWait = document.getElementById("panelWait");
    const panelP1 = document.getElementById("panelP1");
    const panelP2 = document.getElementById("panelP2");
    const panelLevelSelect = document.getElementById("panelLevelSelect");

    function showOnly(panel){
      [panelWait, panelP1, panelP2, panelLevelSelect].forEach(p => p.classList.add("hidden"));
      panel.classList.remove("hidden");
    }

    // Default: Espera
    showOnly(panelWait);

    // ---------- Command sending (robusto: intenta varios endpoints) ----------
    async function postJson(url, body){
      const res = await fetch(url, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(body)
      });
      if(!res.ok) throw new Error("HTTP " + res.status);
      return res;
    }

    async function sendCommand(cmd){
      if(!sessionCode){
        statusPill.textContent = "sin code";
        return;
      }

      const payload = { code: sessionCode, cmd };

      // Lista de endpoints posibles (para no romper aunque tu server cambie)
      const endpoints = [
        "/api/cmd",
        "/api/command",
        "/api/send",
        "/api/push"
      ];

      for(const ep of endpoints){
        try{
          await postJson(ep, payload);
          statusPill.textContent = "ok";
          return;
        }catch(e){}
      }

      // Fallback querystring (por si tu server usa GET)
      try{
        const u = `/api/cmd?code=${encodeURIComponent(sessionCode)}&cmd=${encodeURIComponent(cmd)}`;
        const r = await fetch(u);
        if(r.ok){ statusPill.textContent="ok"; return; }
      }catch(e){}

      statusPill.textContent = "error";
    }

    // click handlers
    document.querySelectorAll("[data-cmd]").forEach(btn => {
      btn.addEventListener("click", () => {
        const cmd = btn.getAttribute("data-cmd");
        if(cmd) sendCommand(cmd);
      });
    });

    // ---------- Ping (si existe) ----------
    async function ping(){
      if(!sessionCode) return;
      // ping suave: no rompe si no existe
      try{
        const r = await fetch(`/api/ping?code=${encodeURIComponent(sessionCode)}`);
        statusPill.textContent = r.ok ? "online" : "online?";
      }catch(e){
        statusPill.textContent = "online?";
      }
    }
    ping();

    // ---------- Stage polling (opcional; si tu server expone /api/state o similar) ----------
    async function pollStage(){
      if(!sessionCode) return;

      // NO rompe si no existe el endpoint: si falla, mantenemos panel actual.
      const candidates = [
        `/api/state?code=${encodeURIComponent(sessionCode)}`,
        `/api/presence?code=${encodeURIComponent(sessionCode)}`
      ];

      for(const url of candidates){
        try{
          const r = await fetch(url, { cache:"no-store" });
          if(!r.ok) continue;
          const j = await r.json();

          // Soportamos varias formas:
          // {stage:"wait|p1|p2|levelselect|level"}  ó {presence:{stage:"..."}} etc.
          const stage = (j.stage || (j.presence && j.presence.stage) || "").toString().toLowerCase();

          if(stage.includes("start") || stage.includes("wait") || stage.includes("trailer")){
            showOnly(panelWait);
          }else if(stage.includes("p1")){
            showOnly(panelP1);
          }else if(stage.includes("p2")){
            showOnly(panelP2);
          }else if(stage.includes("select")){
            showOnly(panelLevelSelect);
          }else if(stage.includes("level")){
            // En Level dejá el panel P1 por defecto (si querés que el jugador controle slingshot + power)
            showOnly(panelP1);
          }
          return;
        }catch(e){}
      }
    }

    setInterval(pollStage, 600);
  </script>
</body>
</html>
