<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Angry Remote</title>
  <style>
    :root{
      --bg:#06102a;
      --panel:rgba(255,255,255,0.06);
      --line:rgba(255,255,255,0.12);
      --txt:#eaf0ff;
      --muted:rgba(234,240,255,0.65);
      --blue:#2ec7ff;
      --violet:#6f63ff;
      --red:#ff3b3b;
      --white:#ffffff;
    }
    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
    body{
      margin:0; min-height:100vh; background:radial-gradient(1200px 700px at 50% -10%, #203a7a 0%, var(--bg) 60%);
      color:var(--txt); padding:16px;
    }
    .top{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
    .pill{background:rgba(255,255,255,0.10);border:1px solid var(--line);padding:8px 10px;border-radius:999px;font-weight:600}
    .pill small{font-weight:500;color:var(--muted)}
    .statusDot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;background:#999}
    .card{
      background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:14px;
      max-width:520px;
    }
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    input{
      flex:1; min-width:140px;
      background:rgba(0,0,0,0.45); color:var(--txt);
      border:1px solid var(--line); border-radius:14px; padding:12px 12px; font-size:16px;
      outline:none;
    }
    button{
      border:none;border-radius:16px;padding:14px 14px;font-weight:800;
      color:#07112a; background:var(--white);
      min-width:120px; font-size:16px;
    }
    button.primary{background:var(--violet); color:white;}
    button.blue{background:var(--blue); color:#052033;}
    button.danger{background:var(--red); color:white;}
    button.ghost{
      background:rgba(255,255,255,0.10); color:var(--txt); border:1px solid var(--line);
    }
    button:disabled{opacity:.35}
    h3{margin:14px 0 8px 0}
    .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .full{grid-column:1/-1}
    .hint{color:var(--muted);font-size:13px;margin-top:8px;line-height:1.35}
    .log{margin-top:10px;color:rgba(255,255,255,0.82);font-size:13px}
    .touch{
      margin-top:12px;
      width:100%;
      height:210px;
      border-radius:18px;
      border:1px dashed rgba(255,255,255,0.25);
      background:rgba(0,0,0,0.15);
      display:flex;align-items:center;justify-content:center;
      user-select:none; touch-action:none;
      position:relative;
      overflow:hidden;
    }
    .touch .dot{
      position:absolute; width:18px;height:18px;border-radius:50%;
      background:rgba(46,199,255,0.9);
      transform:translate(-50%,-50%);
      display:none;
    }
    .touch .label{
      color:rgba(255,255,255,0.75);font-weight:700;text-align:center;padding:0 10px;
    }
  </style>
</head>
<body>

  <div class="top">
    <div class="pill"><small>CODE:</small> <span id="codePill">----</span></div>
    <div class="pill"><span class="statusDot" id="onlineDot"></span><span id="onlineTxt">offline</span></div>
    <div class="pill"><small>Stage:</small> <span id="stagePill">unknown</span></div>
    <div class="pill"><small>Activo:</small> <span id="activePill">P1</span></div>
  </div>

  <div class="card">
    <div class="row">
      <input id="codeInput" placeholder="Código (ej: CULA)" />
      <button class="primary" id="okBtn">OK</button>
    </div>

    <h3>Modo</h3>
    <div class="row">
      <button class="ghost" id="p1Btn">Player 1</button>
      <button class="ghost" id="p2Btn">Player 2</button>
    </div>

    <h3>Start</h3>
    <div class="grid2">
      <button class="primary" id="playBtn">PLAY</button>
      <button class="blue" id="trailerBtn">TRAILER</button>
      <button class="danger full" id="stopBtn">STOP</button>
    </div>

    <h3>Level Select</h3>
    <div class="grid">
      <button class="ghost" id="leftBtn">LEFT</button>
      <button class="blue" id="lsPlayBtn">PLAY</button>
      <button class="ghost" id="rightBtn">RIGHT</button>
    </div>

    <h3>Level 1</h3>
    <div class="grid2">
      <button class="primary" id="slot0Btn">SLOT1 • Ovejita</button>
      <button class="primary" id="slot1Btn">SLOT2 • Patito</button>
      <button class="primary" id="slot2Btn">SLOT3 • Carpinchita</button>
      <button class="primary" id="slot3Btn">SLOT4 • Rita</button>
      <button class="primary full" id="slot4Btn">SLOT5 • Vaquita Peluda</button>
    </div>

    <div class="grid2" style="margin-top:10px">
      <button class="blue" id="hatBtn">HAT (Poder Argentino)</button>
      <button class="blue" id="powerBtn">POWER (2do toque)</button>
    </div>

    <div class="touch" id="touchPad">
      <div class="dot" id="touchDot"></div>
      <div class="label">
        SLINGSHOT (drag + soltar)<br/>
        <span style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.6)">
          manda AIM:x:y y FIRE:x:y (x,y -1..1)
        </span>
      </div>
    </div>

    <h3>Global</h3>
    <div class="grid2">
      <button class="ghost" id="homeBtn">HOME</button>
      <button class="ghost" id="restartBtn">RESTART</button>
      <button class="danger full" id="exitBtn">EXIT</button>
    </div>

    <div class="hint">
      Si Unity está conectado, vas a ver online (verde).<br/>
      Si no, igual manda comandos (quedan en cola en el server).
    </div>

    <div class="log" id="log"></div>
  </div>

<script>
  const baseUrl = location.origin;
  const $ = (id)=>document.getElementById(id);

  let code = (new URLSearchParams(location.search).get("code") || "").toUpperCase().trim();
  let player = "P1";

  function setLog(msg){
    $("log").textContent = "cmd: " + msg;
  }

  function setUI(){
    $("codeInput").value = code;
    $("codePill").textContent = code || "----";
    $("activePill").textContent = player;
    $("p1Btn").classList.toggle("primary", player==="P1");
    $("p2Btn").classList.toggle("primary", player==="P2");
  }

  async function send(cmdTail){
    if(!code){ setLog("Falta code"); return; }
    const cmd = `${player}_${cmdTail}`;
    setLog(cmd);

    try{
      const r = await fetch(`${baseUrl}/api/cmd`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({code, cmd})
      });
      const j = await r.json().catch(()=>null);
      if(!j || !j.ok) console.warn("cmd not ok", j);
    }catch(e){
      console.warn(e);
    }
  }

  async function pollState(){
    if(!code){
      $("stagePill").textContent = "unknown";
      $("onlineTxt").textContent = "offline";
      $("onlineDot").style.background = "#999";
      return;
    }
    try{
      const r = await fetch(`${baseUrl}/api/state?code=${encodeURIComponent(code)}`);
      const j = await r.json();
      if(j && j.ok){
        $("stagePill").textContent = j.stage || "unknown";
        const online = (Date.now() - (j.ts||0)) < 2500;
        $("onlineTxt").textContent = online ? "online" : "offline";
        $("onlineDot").style.background = online ? "#33dd66" : "#999";
      }
    }catch(e){
      $("onlineTxt").textContent = "offline";
      $("onlineDot").style.background = "#999";
    }
  }

  // Buttons
  $("okBtn").onclick = ()=>{
    code = $("codeInput").value.toUpperCase().trim();
    const url = new URL(location.href);
    if(code) url.searchParams.set("code", code);
    history.replaceState({}, "", url.toString());
    setUI();
  };

  $("p1Btn").onclick = ()=>{ player="P1"; setUI(); };
  $("p2Btn").onclick = ()=>{ player="P2"; setUI(); };

  $("playBtn").onclick = ()=>send("PLAY");
  $("trailerBtn").onclick = ()=>send("TRAILER");
  $("stopBtn").onclick = ()=>send("STOPTRAILER");

  $("leftBtn").onclick = ()=>send("LEFT");
  $("rightBtn").onclick = ()=>send("RIGHT");
  $("lsPlayBtn").onclick = ()=>send("PLAY");

  // Slot order EXACTO (0..4)
  $("slot0Btn").onclick = ()=>send("SLOT0"); // Ovejita
  $("slot1Btn").onclick = ()=>send("SLOT1"); // Patito
  $("slot2Btn").onclick = ()=>send("SLOT2"); // Carpinchita
  $("slot3Btn").onclick = ()=>send("SLOT3"); // Rita
  $("slot4Btn").onclick = ()=>send("SLOT4"); // Vaquita Peluda

  $("hatBtn").onclick = ()=>send("HAT");
  $("powerBtn").onclick = ()=>send("POWER");

  $("homeBtn").onclick = ()=>send("HOME");
  $("restartBtn").onclick = ()=>send("RESTART");
  $("exitBtn").onclick = ()=>send("EXIT");

  // Touchpad slingshot
  const pad = $("touchPad");
  const dot = $("touchDot");
  let dragging = false;

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  function posToNorm(e){
    const rect = pad.getBoundingClientRect();
    const x = (("touches" in e) ? e.touches[0].clientX : e.clientX);
    const y = (("touches" in e) ? e.touches[0].clientY : e.clientY);

    const nx = clamp(((x - rect.left) / rect.width) * 2 - 1, -1, 1);
    const ny = clamp(-(((y - rect.top) / rect.height) * 2 - 1), -1, 1); // invert Y
    return { nx, ny, px:x-rect.left, py:y-rect.top, rect };
  }

  async function sendAim(nx, ny){
    // 2 decimales para que no spamee tanto
    await send(`AIM:${nx.toFixed(2)}:${ny.toFixed(2)}`);
  }
  async function sendFire(nx, ny){
    await send(`FIRE:${nx.toFixed(2)}:${ny.toFixed(2)}`);
  }

  pad.addEventListener("pointerdown", async (e)=>{
    if(!code) return;
    dragging = true;
    pad.setPointerCapture(e.pointerId);
    const p = posToNorm(e);
    dot.style.display = "block";
    dot.style.left = p.px + "px";
    dot.style.top = p.py + "px";
    await sendAim(p.nx, p.ny);
  });

  pad.addEventListener("pointermove", async (e)=>{
    if(!dragging) return;
    const p = posToNorm(e);
    dot.style.left = p.px + "px";
    dot.style.top = p.py + "px";
    await sendAim(p.nx, p.ny);
  });

  pad.addEventListener("pointerup", async (e)=>{
    if(!dragging) return;
    dragging = false;
    const p = posToNorm(e);
    dot.style.left = p.px + "px";
    dot.style.top = p.py + "px";
    await sendFire(p.nx, p.ny);
    setTimeout(()=>{ dot.style.display="none"; }, 120);
  });

  // init
  setUI();
  pollState();
  setInterval(pollState, 700);
</script>

</body>
</html>
