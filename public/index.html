<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Angry Remote</title>

  <style>
    @font-face {
      font-family: "MonsterChew";
      src: url("/Font/CCThisManThisMonster W00 Chew/CCThisManThisMonster W00 Chew.ttf") format("truetype");
      font-display: swap;
    }

    :root{
      --mint-0:#eef9f1;
      --mint-1:#dff2e5;
      --vio-0:#f2e6ff;
      --vio-1:#dcbcff;
      --vio-2:#b986ff;
      --ink:#142016;
      --shadow:0 12px 26px rgba(0,0,0,.14);
      --stroke:rgba(30,60,40,.12);
      --safe-bottom:max(16px, env(safe-area-inset-bottom));
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      min-height:100%;
      background: linear-gradient(180deg, var(--mint-0), var(--mint-1));
      color:var(--ink);
      font-family:"MonsterChew", system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior:none;
    }

    body{
      display:flex;
      justify-content:center;
    }

    .app{
      width:min(540px, 100%);
      min-height:100vh;
      padding:10px 10px var(--safe-bottom);
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .hidden{ display:none !important; }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-radius:18px;
      background:rgba(255,255,255,.72);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
    }

    .topLeft{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .playerChip{
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,.82);
      border:1px solid rgba(0,0,0,.08);
      min-width:54px;
      height:44px;
      padding:0 14px;
      font:inherit;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,.08);
    }

    .playerChip.active{
      background: linear-gradient(180deg, var(--vio-0), var(--vio-2));
      color:#241339;
      border-color: rgba(90,31,214,.22);
    }

    .sessionMini{
      display:flex;
      align-items:center;
      gap:8px;
      flex:1;
      justify-content:flex-end;
    }

    .sessionMini input{
      width:118px;
      height:42px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.88);
      padding:0 12px;
      text-transform:uppercase;
      font:inherit;
      font-size:18px;
      outline:none;
    }

    .miniBtn{
      border:none;
      border-radius:999px;
      height:42px;
      padding:0 18px;
      font:inherit;
      font-size:18px;
      cursor:pointer;
      color:#241339;
      background: linear-gradient(180deg, var(--vio-0), var(--vio-2));
      border:1px solid rgba(90,31,214,.20);
      box-shadow:0 8px 14px rgba(0,0,0,.10);
    }

    .statusRow{
      display:flex;
      gap:8px;
      margin-top:8px;
    }

    .statusBox{
      flex:1;
      min-height:46px;
      padding:10px 12px;
      border-radius:16px;
      background:rgba(255,255,255,.68);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:17px;
      line-height:1;
    }

    .screen{
      position:relative;
      flex:1;
      min-height:76vh;
      border-radius:28px;
      overflow:hidden;
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      background:rgba(255,255,255,.22);
    }

    .bg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:.98;
      pointer-events:none;
      user-select:none;
    }

    .layer{
      position:relative;
      z-index:2;
      height:100%;
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:14px;
    }

    .footerTitle{
      margin-top:auto;
      text-align:center;
      font-size:50px;
      line-height:.9;
      color:#f7f7f7;
      text-shadow:
        0 4px 0 rgba(0,0,0,.08),
        0 10px 18px rgba(0,0,0,.18);
      user-select:none;
      pointer-events:none;
    }

    .footerTitle.compact{
      font-size:42px;
      opacity:.92;
    }

    .topIcons{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .iconRow{
      display:flex;
      gap:12px;
      align-items:center;
    }

    .imgOnlyBtn{
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.12));
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .imgOnlyBtn img{
      display:block;
      object-fit:contain;
      pointer-events:none;
      user-select:none;
    }

    .imgOnlyBtn.icon img{
      width:72px;
      height:72px;
    }

    .imgOnlyBtn.medium img{
      height:92px;
      width:auto;
    }

    .imgOnlyBtn.small img{
      height:72px;
      width:auto;
    }

    .centerStage{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:26px;
    }

    .charLayout{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:18px;
      justify-content:flex-start;
      padding-top:4px;
    }

    .specialTop{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:84px;
    }

    .charArea{
      flex:1;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px 18px;
      align-content:center;
      justify-items:center;
      padding:0 4px;
    }

    .charBtn{
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.12));
    }

    .charBtn img{
      max-width:142px;
      max-height:122px;
      object-fit:contain;
      pointer-events:none;
      user-select:none;
    }

    .specialPower{
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.12));
    }

    .specialPower img{
      width:88px;
      height:88px;
      object-fit:contain;
      pointer-events:none;
    }

    .aimMode{
      height:100%;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .aimCanvas{
      position:relative;
      flex:1;
      min-height:70vh;
      touch-action:none;
      background:transparent;
      overflow:hidden;
      border-radius:28px;
    }

    .aimCanvas img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:center center;
      pointer-events:none;
      user-select:none;
    }

    .aimHint{
      position:absolute;
      left:14px;
      top:14px;
      padding:10px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.72);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      font-size:18px;
      z-index:3;
    }

    .powerScreen{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:24px;
      min-height:68vh;
    }

    .powerBig{
      border:none;
      background:transparent;
      cursor:pointer;
      padding:0;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.14));
    }

    .powerBig img{
      width:min(72vw, 280px);
      height:auto;
      object-fit:contain;
      pointer-events:none;
      user-select:none;
    }

    .powerLabel{
      padding:10px 16px;
      border-radius:14px;
      background:rgba(255,255,255,.74);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      font-size:22px;
    }

    .waitingWrap{
      height:100%;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .waitingStage{
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      min-height:70vh;
    }

    .waitingGrid{
      flex:1;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
      align-content:center;
      justify-items:center;
      padding:10px 12px 4px;
    }

    .waitCard{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .waitCard img{
      width:100%;
      max-width:170px;
      object-fit:contain;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.10));
    }

    @media (max-width:440px){
      .footerTitle{ font-size:42px; }
      .imgOnlyBtn.icon img{ width:66px; height:66px; }
      .imgOnlyBtn.medium img{ height:82px; }
      .imgOnlyBtn.small img{ height:66px; }
      .charBtn img{ max-width:122px; max-height:106px; }
      .specialPower img{ width:78px; height:78px; }
      .powerBig img{ width:min(76vw, 250px); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="topShell">
      <div id="topbar" class="topbar">
        <div class="topLeft">
          <button id="p1Btn" class="playerChip">P1</button>
          <button id="p2Btn" class="playerChip">P2</button>
        </div>

        <div class="sessionMini">
          <input id="codeInput" maxlength="12" placeholder="CULA" />
          <button id="applyBtn" class="miniBtn">APLICAR</button>
        </div>
      </div>

      <div id="statusRow" class="statusRow">
        <div class="statusBox">stage: <span id="stageText" style="margin-left:6px;">-</span></div>
        <div class="statusBox">active: <span id="activeText" style="margin-left:6px;">-</span></div>
        <div class="statusBox">net: <span id="netText" style="margin-left:6px;">...</span></div>
      </div>
    </div>

    <div class="screen" id="screen">
      <img id="screenBg" class="bg" alt="" />
      <div id="layer" class="layer"></div>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);

  let player = "P1";
  let code = "CULA";
  let lastState = { stage:"start", active:"", ts:0 };
  let netOk = false;

  let selectedSlot = null;
  let shotFired = false;

  const IMG = {
    BG_WAIT: "/style/BG ESPERA.png?v=3",
    BG_P1: "/style/BG P1.png?v=3",
    BG_P2: "/style/BG P2.png?v=3",
    SLINGSHOT: "/style/SLINGSHOT.png?v=3",

    PLAY: "/style/PLAY.png?v=3",
    TRAILER: "/style/TRAILER.png?v=3",
    RESTART: "/style/RESTART.png?v=3",
    EXIT: "/style/EXIT.png?v=3",
    HOME: "/style/HOME.png?v=3",
    LEFT: "/style/LEFT.png?v=3",
    RIGHT: "/style/RIGHT.png?v=3",

    OVEJITA: "/style/OVEJITA.png?v=3",
    PATITO: "/style/PATITO.png?v=3",
    CARPINCHITA: "/style/CARPINCHITA.png?v=3",
    RITA: "/style/RITA.png?v=3",
    VAQUITA_PELUDA: "/style/VAQUITA PELUDA.png?v=3",
    HAT: "/style/poder argentino.png?v=3",

    ANGRY_OVEJITA: "/style/ANGRY OVEJITA.png?v=3",
    ANGRY_PATITO: "/style/ANGRY PATITO.png?v=3",
    ANGRY_CARPINCHITA: "/style/ANGRY CARPINCHITA.png?v=3",
    ANGRY_RITA: "/style/ANGRY RITA.png?v=3",
    ANGRY_VAQUITA_PELUDA: "/style/ANGRY VAQUITA PELUDA.png?v=3",

    LINDA1: "/style/LINDA 1.png?v=3",
    LINDA2: "/style/LINDA 2.png?v=3",
    LINDA3: "/style/LINDA 3.png?v=3",
    LINDA4: "/style/LINDA 4.png?v=3"
  };

  function getPlayerFromUrl(){
    const u = new URL(location.href);
    const p = (u.searchParams.get("p") || u.searchParams.get("player") || "").trim();
    if (p === "2") return "P2";
    if (p === "1") return "P1";
    return "";
  }

  function loadPersisted(){
    player = getPlayerFromUrl() || localStorage.getItem("angry_player") || "P1";
    code = (new URL(location.href)).searchParams.get("code") || localStorage.getItem("angry_code") || "CULA";
    $("codeInput").value = code;
  }

  function setPlayer(p){
    player = p;
    localStorage.setItem("angry_player", player);
    selectedSlot = null;
    shotFired = false;
    render();
  }

  $("p1Btn").onclick = ()=> setPlayer("P1");
  $("p2Btn").onclick = ()=> setPlayer("P2");

  $("applyBtn").onclick = ()=>{
    code = ($("codeInput").value || "").trim().toUpperCase() || "CULA";
    localStorage.setItem("angry_code", code);
    render();
  };

  async function apiGetState(){
    try{
      const r = await fetch(`/api/state?code=${encodeURIComponent(code)}`, { cache:"no-store" });
      const j = await r.json();
      if (j && j.ok){
        lastState = { stage: j.stage || "start", active: j.active || "", ts: j.ts || 0 };
        netOk = true;
      } else {
        netOk = false;
      }
    }catch(e){
      netOk = false;
    }
  }

  async function apiSend(cmd){
    try{
      await fetch("/api/send", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ code, cmd })
      });
      netOk = true;
    }catch(e){
      netOk = false;
    }
  }

  function normalizeStage(s){
    s = (s || "").toLowerCase().trim();
    if (s.includes("trailer")) return "trailer";
    if (s.includes("select")) return "select";
    if (s.includes("level")) return "level";
    if (s.includes("start")) return "start";
    return "start";
  }

  function isCurrentPlayerActive(){
    const act = (lastState.active || "").trim().toUpperCase();
    if (!act) return true;
    return act === player;
  }

  function bgForMain(){
    return player === "P2" ? IMG.BG_P2 : IMG.BG_P1;
  }

  function updateTopVisibility(stage){
    const topShell = $("topShell");
    if (stage === "start" || stage === "trailer"){
      topShell.classList.remove("hidden");
    } else {
      topShell.classList.add("hidden");
    }
  }

  function applyTopSelection(){
    $("p1Btn").classList.toggle("active", player === "P1");
    $("p2Btn").classList.toggle("active", player === "P2");
    $("stageText").textContent = normalizeStage(lastState.stage);
    $("activeText").textContent = lastState.active || "-";
    $("netText").textContent = netOk ? "ok" : "offline";
  }

  function clearLayer(){
    const layer = $("layer");
    while (layer.firstChild) layer.removeChild(layer.firstChild);
    return layer;
  }

  function makeImageButton(src, onClick, extraClass=""){
    const b = document.createElement("button");
    b.className = `imgOnlyBtn ${extraClass}`.trim();
    b.innerHTML = `<img src="${src}" alt="">`;
    b.onclick = onClick;
    return b;
  }

  function footerText(){
    return player === "P1" ? "PLAYER 1" : "PLAYER 2";
  }

  function addFooter(layer, textOverride, compact=false){
    const ft = document.createElement("div");
    ft.className = "footerTitle" + (compact ? " compact" : "");
    ft.textContent = textOverride || footerText();
    layer.appendChild(ft);
  }

  function getAngryImageForSlot(slot){
    switch(slot){
      case 0: return IMG.ANGRY_OVEJITA;
      case 1: return IMG.ANGRY_PATITO;
      case 2: return IMG.ANGRY_CARPINCHITA;
      case 3: return IMG.ANGRY_RITA;
      case 4: return IMG.ANGRY_VAQUITA_PELUDA;
      default: return IMG.PLAY;
    }
  }

  function renderStart(stage){
    const layer = clearLayer();

    const center = document.createElement("div");
    center.className = "centerStage";

    const playBtn = makeImageButton(IMG.PLAY, ()=> apiSend(`${player}_PLAY`), "medium");
    center.appendChild(playBtn);

    const trailerBtn = makeImageButton(IMG.TRAILER, ()=> apiSend(`${player}_TRAILER`), "medium");
    center.appendChild(trailerBtn);

    const exitBtn = makeImageButton(IMG.EXIT, ()=> apiSend(`${player}_EXIT`), "small");
    center.appendChild(exitBtn);

    layer.appendChild(center);
    addFooter(layer);
  }

  function renderLevelSelect(){
    const layer = clearLayer();

    const top = document.createElement("div");
    top.className = "topIcons";

    const left = document.createElement("div");
    left.className = "iconRow";
    left.appendChild(makeImageButton(IMG.HOME, ()=> apiSend(`${player}_HOME`), "icon"));
    top.appendChild(left);

    const right = document.createElement("div");
    right.className = "iconRow";
    right.appendChild(makeImageButton(IMG.EXIT, ()=> apiSend(`${player}_EXIT`), "icon"));
    top.appendChild(right);

    layer.appendChild(top);

    const center = document.createElement("div");
    center.className = "centerStage";

    const label = document.createElement("div");
    label.className = "powerLabel";
    label.textContent = "LEVEL SELECT";
    center.appendChild(label);

    const navRow = document.createElement("div");
    navRow.className = "iconRow";
    navRow.style.justifyContent = "center";
    navRow.style.width = "100%";

    navRow.appendChild(makeImageButton(IMG.LEFT, ()=> apiSend(`${player}_LEFT`), "icon"));
    navRow.appendChild(makeImageButton(IMG.PLAY, ()=> apiSend(`${player}_PLAY`), "icon"));
    navRow.appendChild(makeImageButton(IMG.RIGHT, ()=> apiSend(`${player}_RIGHT`), "icon"));

    center.appendChild(navRow);
    layer.appendChild(center);
    addFooter(layer, footerText(), true);
  }

  function renderCharacterSelectInLevel(){
    const layer = clearLayer();

    const top = document.createElement("div");
    top.className = "topIcons";

    const left = document.createElement("div");
    left.className = "iconRow";
    left.appendChild(makeImageButton(IMG.HOME, ()=> apiSend(`${player}_HOME`), "icon"));
    top.appendChild(left);

    const right = document.createElement("div");
    right.className = "iconRow";
    right.appendChild(makeImageButton(IMG.EXIT, ()=> apiSend(`${player}_EXIT`), "icon"));
    right.appendChild(makeImageButton(IMG.RESTART, ()=> apiSend(`${player}_RESTART`), "icon"));
    top.appendChild(right);

    layer.appendChild(top);

    const wrap = document.createElement("div");
    wrap.className = "charLayout";

    const specialTop = document.createElement("div");
    specialTop.className = "specialTop";

    const hatBtn = document.createElement("button");
    hatBtn.className = "specialPower";
    hatBtn.innerHTML = `<img src="${IMG.HAT}" alt="">`;
    hatBtn.onclick = ()=> apiSend(`${player}_HAT`);
    specialTop.appendChild(hatBtn);

    wrap.appendChild(specialTop);

    const chars = document.createElement("div");
    chars.className = "charArea";

    [
      { img: IMG.RITA, slot: 3 },
      { img: IMG.OVEJITA, slot: 0 },
      { img: IMG.VAQUITA_PELUDA, slot: 4 },
      { img: IMG.PATITO, slot: 1 },
      { img: IMG.CARPINCHITA, slot: 2 }
    ].forEach(c=>{
      const btn = document.createElement("button");
      btn.className = "charBtn";
      btn.innerHTML = `<img src="${c.img}" alt="">`;
      btn.onclick = async ()=>{
        shotFired = false;
        selectedSlot = c.slot;
        await apiSend(`${player}_SLOT${c.slot}`);
        render();
      };
      chars.appendChild(btn);
    });

    wrap.appendChild(chars);
    layer.appendChild(wrap);
    addFooter(layer, footerText(), true);
  }

  function renderAimStage(){
    const layer = clearLayer();

    const top = document.createElement("div");
    top.className = "topIcons";

    const left = document.createElement("div");
    left.className = "iconRow";
    left.appendChild(makeImageButton(IMG.HOME, ()=> apiSend(`${player}_HOME`), "icon"));
    top.appendChild(left);

    const right = document.createElement("div");
    right.className = "iconRow";
    right.appendChild(makeImageButton(IMG.EXIT, ()=> apiSend(`${player}_EXIT`), "icon"));
    right.appendChild(makeImageButton(IMG.RESTART, async ()=> {
      selectedSlot = null;
      shotFired = false;
      await apiSend(`${player}_RESTART`);
      render();
    }, "icon"));
    top.appendChild(right);

    layer.appendChild(top);

    const aimWrap = document.createElement("div");
    aimWrap.className = "aimMode";

    const aimCanvas = document.createElement("div");
    aimCanvas.className = "aimCanvas";

    const aimBg = document.createElement("img");
    aimBg.src = IMG.SLINGSHOT;
    aimBg.onerror = () => {
      console.error("No cargó SLINGSHOT:", aimBg.src);
      aimBg.src = "/style/SLINGSHOT.png?v=fallback";
    };
    aimCanvas.appendChild(aimBg);

    const badge = document.createElement("div");
    badge.className = "aimHint";
    badge.textContent = "SLINGSHOT";
    aimCanvas.appendChild(badge);

    let dragging = false;
    let rect = null;
    let lastAim = { dx: 0, dy: 0 };
    let aimDirty = false;
    let aimSending = false;
    let rafPending = false;

    function getXY(ev){
      const t = ev.touches ? ev.touches[0] : ev;
      return { x: t.clientX, y: t.clientY };
    }

    function fmt(n){
      return (Math.round(n * 1000) / 1000).toString();
    }

    function normFromPoint(x, y){
      if (!rect) rect = aimCanvas.getBoundingClientRect();

      // estrella = 0,0
      const starX = rect.left + rect.width * 0.505;
      const starY = rect.top + rect.height * 0.255;

      const dx = (x - starX) / (rect.width * 0.22);
      const dy = (y - starY) / (rect.height * 0.22);

      const cdx = Math.max(-1, Math.min(1, dx));
      const cdy = Math.max(-1, Math.min(1, dy));

      return { dx: cdx, dy: cdy };
    }

    async function flushAimLoop(){
      if (aimSending) return;
      aimSending = true;

      while (aimDirty) {
        aimDirty = false;
        await apiSend(`${player}_AIM ${fmt(lastAim.dx)} ${fmt(lastAim.dy)}`);
      }

      aimSending = false;
    }

    function queueAim(dx, dy){
      lastAim = { dx, dy };
      aimDirty = true;

      if (!rafPending) {
        rafPending = true;
        requestAnimationFrame(() => {
          rafPending = false;
          flushAimLoop();
        });
      }
    }

    async function fireNow(){
      await flushAimLoop();
      await apiSend(`${player}_FIRE ${fmt(lastAim.dx)} ${fmt(lastAim.dy)}`);
      shotFired = true;
      render();
    }

    aimCanvas.addEventListener("touchstart", (ev)=>{
      ev.preventDefault();
      dragging = true;
      rect = aimCanvas.getBoundingClientRect();
      const {x,y} = getXY(ev);
      const p = normFromPoint(x,y);
      queueAim(p.dx, p.dy);
    }, { passive:false });

    aimCanvas.addEventListener("touchmove", (ev)=>{
      if (!dragging) return;
      ev.preventDefault();
      const {x,y} = getXY(ev);
      const p = normFromPoint(x,y);
      queueAim(p.dx, p.dy);
    }, { passive:false });

    aimCanvas.addEventListener("touchend", async (ev)=>{
      if (!dragging) return;
      ev.preventDefault();
      dragging = false;
      await fireNow();
    }, { passive:false });

    aimCanvas.addEventListener("mousedown", (ev)=>{
      dragging = true;
      rect = aimCanvas.getBoundingClientRect();
      const p = normFromPoint(ev.clientX, ev.clientY);
      queueAim(p.dx, p.dy);
    });

    window.addEventListener("mousemove", (ev)=>{
      if (!dragging) return;
      const p = normFromPoint(ev.clientX, ev.clientY);
      queueAim(p.dx, p.dy);
    });

    window.addEventListener("mouseup", async ()=>{
      if (!dragging) return;
      dragging = false;
      await fireNow();
    });

    aimWrap.appendChild(aimCanvas);
    layer.appendChild(aimWrap);
  }

  function renderPowerStage(){
    const layer = clearLayer();

    const top = document.createElement("div");
    top.className = "topIcons";

    const left = document.createElement("div");
    left.className = "iconRow";
    left.appendChild(makeImageButton(IMG.HOME, ()=> apiSend(`${player}_HOME`), "icon"));
    top.appendChild(left);

    const right = document.createElement("div");
    right.className = "iconRow";
    right.appendChild(makeImageButton(IMG.EXIT, ()=> apiSend(`${player}_EXIT`), "icon"));
    right.appendChild(makeImageButton(IMG.RESTART, async ()=> {
      selectedSlot = null;
      shotFired = false;
      await apiSend(`${player}_RESTART`);
      render();
    }, "icon"));
    top.appendChild(right);

    layer.appendChild(top);

    const power = document.createElement("div");
    power.className = "powerScreen";

    const label = document.createElement("div");
    label.className = "powerLabel";
    label.textContent = "POWER";
    power.appendChild(label);

    const btn = document.createElement("button");
    btn.className = "powerBig";
    btn.innerHTML = `<img src="${getAngryImageForSlot(selectedSlot)}" alt="">`;
    btn.onclick = ()=> apiSend(`${player}_POWER`);

    power.appendChild(btn);
    layer.appendChild(power);
  }

  function renderWaiting(){
    const layer = clearLayer();

    const top = document.createElement("div");
    top.className = "topIcons";

    const left = document.createElement("div");
    left.className = "iconRow";
    left.appendChild(makeImageButton(IMG.HOME, ()=> apiSend(`${player}_HOME`), "icon"));
    top.appendChild(left);

    const right = document.createElement("div");
    right.className = "iconRow";
    right.appendChild(makeImageButton(IMG.EXIT, ()=> apiSend(`${player}_EXIT`), "icon"));
    top.appendChild(right);

    layer.appendChild(top);

    const wrap = document.createElement("div");
    wrap.className = "waitingWrap";

    const stage = document.createElement("div");
    stage.className = "waitingStage";

    const grid = document.createElement("div");
    grid.className = "waitingGrid";

    [IMG.LINDA1, IMG.LINDA2, IMG.LINDA3, IMG.LINDA4].forEach(src=>{
      const c = document.createElement("div");
      c.className = "waitCard";
      c.innerHTML = `<img src="${src}" alt="">`;
      grid.appendChild(c);
    });

    stage.appendChild(grid);
    wrap.appendChild(stage);

    layer.appendChild(wrap);
    addFooter(layer, "WAITING");
  }

  function renderLevel(){
    if (!isCurrentPlayerActive()){
      renderWaiting();
      return;
    }

    if (selectedSlot === null){
      renderCharacterSelectInLevel();
      return;
    }

    if (!shotFired){
      renderAimStage();
      return;
    }

    renderPowerStage();
  }

  function render(){
    const stage = normalizeStage(lastState.stage);

    applyTopSelection();
    updateTopVisibility(stage);
    $("screenBg").src = bgForMain();

    if (stage === "start" || stage === "trailer"){
      selectedSlot = null;
      shotFired = false;
      renderStart(stage);
      return;
    }

    if (stage === "select"){
      selectedSlot = null;
      shotFired = false;
      renderLevelSelect();
      return;
    }

    if (stage === "level"){
      renderLevel();
      return;
    }

    renderStart(stage);
  }

  async function tick(){
    await apiGetState();
    render();
  }

  loadPersisted();
  render();
  tick();
  setInterval(tick, 350);
</script>
</body>
</html>
