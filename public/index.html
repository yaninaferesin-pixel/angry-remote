<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Remote</title>
  <style>
    :root{
      --bg:#0b0f1a; --card:#121a2a; --muted:#7d8aa5; --text:#e9eefc;
      --accent:#6d5efc; --accent2:#00d1ff; --danger:#ff3b3b; --btn:#1a2440;
      --btn2:#222f55;
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 800px at 50% -100px, #1b2a5c 0%, var(--bg) 55%);
      color:var(--text);
    }
    .wrap{max-width:520px;margin:0 auto;padding:18px 16px 28px}
    .topRow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .pill{
      background:rgba(255,255,255,06);
      border:1px solid rgba(255,255,255,08);
      padding:8px 12px;border-radius:999px;color:var(--text);
      display:inline-flex;gap:8px;align-items:center;
    }
    .pill b{font-weight:700}
    .onlineDot{width:10px;height:10px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 4px rgba(34,197,94,15)}
    .offlineDot{width:10px;height:10px;border-radius:50%;background:#ef4444;box-shadow:0 0 0 4px rgba(239,68,68,12)}
    .card{
      margin-top:14px;
      background:rgba(18,26,42,78);
      border:1px solid rgba(255,255,255,08);
      border-radius:var(--radius);
      padding:14px;
      box-shadow:0 14px 40px rgba(0,0,0,25);
    }
    .tabs{display:flex;gap:10px;margin-top:12px}
    .tab{
      flex:1;
      background:rgba(255,255,255,06);
      border:1px solid rgba(255,255,255,08);
      color:var(--text);
      padding:12px 10px;
      border-radius:999px;
      font-weight:700;
      cursor:pointer;
    }
    .tab.active{outline:2px solid rgba(109,94,252,7); background:rgba(109,94,252,15)}
    .muted{color:var(--muted); font-size:13px; line-height:1.35}
    .row{display:flex;gap:10px}
    input{
      width:100%;
      background:rgba(0,0,0,25);
      border:1px solid rgba(255,255,255,12);
      color:var(--text);
      padding:12px 12px;border-radius:14px;
      outline:none;
      font-size:16px;
    }
    .btn{
      user-select:none;
      background:linear-gradient(180deg, rgba(255,255,255,08), rgba(255,255,255,03));
      border:1px solid rgba(255,255,255,10);
      color:var(--text);
      padding:14px 12px;
      border-radius:16px;
      font-weight:800;
      letter-spacing:.3px;
      cursor:pointer;
      width:100%;
      text-align:center;
    }
    .btn.small{padding:11px 10px; font-weight:700}
    .btn.accent{background:linear-gradient(180deg, rgba(109,94,252,9), rgba(109,94,252,55)); border-color:rgba(109,94,252,9)}
    .btn.alt{background:linear-gradient(180deg, rgba(0,209,255,55), rgba(0,209,255,25)); border-color:rgba(0,209,255,55)}
    .btn.danger{background:linear-gradient(180deg, rgba(255,59,59,9), rgba(255,59,59,55)); border-color:rgba(255,59,59,9)}
    .grid2{display:grid;grid-template-columns:1fr 1fr; gap:10px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr; gap:10px}
    .sectionTitle{font-weight:900; margin:8px 2px 10px; font-size:14px; color:#cfe0ff; opacity:.95}
    .divider{height:1px;background:rgba(255,255,255,08); margin:12px 0}
    .hint{font-size:12px; color:var(--muted); margin-top:8px}
    .warn{color:#ffd36e}
  </style>
</head>
<body>
  <div class="wrap">

    <div class="topRow">
      <div class="pill"><span>CODE:</span> <b id="roomCode">—</b></div>
      <div class="pill" id="onlinePill"><span class="offlineDot" id="dot"></span> <b id="onlineTxt">offline</b></div>
      <div class="pill"><span>Stage:</span> <b id="stageTxt">—</b></div>
      <div class="pill"><span>Activo:</span> <b id="activeTxt">—</b></div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabP1">Player 1</button>
      <button class="tab" id="tabP2">Player 2</button>
      <button class="tab" id="tabWait">Espera</button>
    </div>

    <div class="card">
      <div class="muted">
        Escaneá el QR. La botonera cambia sola según la escena (presence/state).<br/>
        Detectado: <b id="detectedTxt">—</b>
      </div>

      <div class="divider"></div>

      <div class="row">
        <input id="codeInput" placeholder="Ingresá el código..." />
        <div class="btn small accent" id="btnSetCode" style="max-width:110px">OK</div>
      </div>

      <div class="divider"></div>

      <div id="content"></div>

      <div class="divider"></div>

      <div class="grid2">
        <div class="btn" id="btnHome">HOME</div>
        <div class="btn" id="btnRestart">RESTART</div>
      </div>
      <div style="margin-top:10px">
        <div class="btn danger" id="btnExit">EXIT</div>
      </div>

      <div class="hint" id="debugHint"></div>
    </div>
  </div>

<script>
  let uiMode = "P1"; // "P1" | "P2" | "WAIT"
  let roomCode = localStorage.getItem("ROOM_CODE") || "";
  let lastPresence = null;

  const $ = (id)=>document.getElementById(id);

  // Leer code desde URL (?code=XXXX) para que funcione con GetJoinUrl() de Unity
  (function readCodeFromUrl(){
    const p = new URLSearchParams(location.search);
    const c = (p.get("code") || "").trim().toUpperCase();
    if(c){
      roomCode = c;
      localStorage.setItem("ROOM_CODE", roomCode);
      // history.replaceState({}, "", location.pathname); // si querés limpiar la URL
    }
  })();

  $("codeInput").value = roomCode;
  $("roomCode").textContent = roomCode || "—";

  function setHint(t){ $("debugHint").textContent = t || ""; }

  async function sendCmd(cmd){
    if(!roomCode){
      setHint("⚠️ Primero poné el CODE y tocá OK.");
      return;
    }

    try{
      const res = await fetch(`/api/send`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code: roomCode, cmd })
      });
      const json = await res.json().catch(()=>null);
      setHint(`✅ cmd: ${cmd}`);
      return json;
    }catch(e){
      setHint("❌ Error enviando cmd.");
    }
  }

  function setTab(mode){
    uiMode = mode;
    $("tabP1").classList.toggle("active", mode==="P1");
    $("tabP2").classList.toggle("active", mode==="P2");
    $("tabWait").classList.toggle("active", mode==="WAIT");
    renderContent(lastPresence);
  }
  $("tabP1").onclick = ()=>setTab("P1");
  $("tabP2").onclick = ()=>setTab("P2");
  $("tabWait").onclick = ()=>setTab("WAIT");

  $("btnSetCode").onclick = ()=>{
    roomCode = $("codeInput").value.trim().toUpperCase();
    localStorage.setItem("ROOM_CODE", roomCode);
    $("roomCode").textContent = roomCode || "—";
    setHint(roomCode ? "✅ Code seteado." : "⚠️ Sin code.");
  };

  // Botones globales (los mando como comandos también, con prefijo del tab actual)
  function prefixed(cmd){
    const prefix = (uiMode === "WAIT") ? "WAIT" : uiMode; // P1/P2/WAIT
    return `${prefix}_${cmd}`;
  }

  $("btnHome").onclick = ()=>sendCmd(prefixed("HOME"));
  $("btnRestart").onclick = ()=>sendCmd(prefixed("RESTART"));
  $("btnExit").onclick = ()=>sendCmd(prefixed("EXIT"));

  async function pollPresence(){
    if(!roomCode){
      $("onlineTxt").textContent = "offline";
      $("stageTxt").textContent = "—";
      $("activeTxt").textContent = "—";
      $("detectedTxt").textContent = "—";
      renderContent(null);
      return;
    }

    try{
      const res = await fetch(`/api/state?code=${encodeURIComponent(roomCode)}`);
      const data = await res.json();

      // server responde { ok:true, stage, active, updatedAt }
      lastPresence = data;

      const stage = data?.stage || "—";
      const active = data?.active || "—";
      $("stageTxt").textContent = stage;
      $("detectedTxt").textContent = stage;
      $("activeTxt").textContent = active;

      // online/offline: si updatedAt es reciente
      const now = Date.now();
      const updatedAt = Number(data?.updatedAt || 0);
      const online = updatedAt > 0 && (now - updatedAt) < 7000;

      $("onlineTxt").textContent = online ? "online" : "offline";
      $("dot").className = online ? "onlineDot" : "offlineDot";

      renderContent(data);
    }catch(e){
      $("onlineTxt").textContent = "offline";
      $("dot").className = "offlineDot";
    }
  }

  function renderContent(presence){
    const el = $("content");
    el.innerHTML = "";

    const stage = (presence?.stage || "").toLowerCase();
    const active = presence?.active || "";

    if(!stage){
      el.innerHTML = `<div class="muted">Esperando presencia...</div>`;
      return;
    }

    // helper para botones en grilla
    const mk = (label, cmd, css="btn", onClickOverride=null)=>{
      const d = document.createElement("div");
      d.className = css;
      d.textContent = label;
      d.onclick = onClickOverride ? onClickOverride : (()=>sendCmd(prefixed(cmd)));
      return d;
    };

    if(stage === "start"){
      el.innerHTML = `<div class="sectionTitle">Start</div>`;
      const g = document.createElement("div");
      g.className = "grid2";

      g.appendChild(mk("PLAY", "PLAY", "btn accent"));

      // TRAILER: manda comando y además cambia panel inmediato (feedback),
      // pero Unity sigue siendo la fuente real (por /api/state).
      g.appendChild(mk("TRAILER", "TRAILER", "btn alt", async ()=>{
        await sendCmd(prefixed("TRAILER"));
        // feedback inmediato:
        renderContent({ stage:"trailer", active: presence?.active || (uiMode==="WAIT"?"WAIT":uiMode) });
      }));

      el.appendChild(g);
      return;
    }

    // ✅ NUEVO: stage trailer
    if(stage === "trailer"){
      el.innerHTML = `<div class="sectionTitle">Trailer</div>`;
      const g = document.createElement("div");
      g.className = "grid2";
      g.appendChild(mk("STOP", "STOPTRAILER", "btn danger"));
      g.appendChild(mk("VOLVER", "HOME", "btn alt"));
      el.appendChild(g);

      el.appendChild(Object.assign(document.createElement("div"), {
        className:"hint",
        textContent:"STOP manda P1_STOPTRAILER / P2_STOPTRAILER según tu tab."
      }));
      return;
    }

    if(stage === "levelselect"){
      el.innerHTML = `<div class="sectionTitle">Level Select</div>`;
      const g = document.createElement("div");
      g.className = "grid2";
      g.appendChild(mk("LEVEL 1", "LEVEL_1", "btn accent"));
      g.appendChild(mk("LEVEL 2", "LEVEL_2", "btn accent"));
      g.appendChild(mk("LEVEL 3", "LEVEL_3", "btn accent"));
      g.appendChild(mk("PLAY", "PLAY", "btn alt"));
      el.appendChild(g);
      return;
    }

    if(stage === "level"){
      el.innerHTML = `<div class="sectionTitle">Nivel (${active || uiMode})</div>`;

      const g = document.createElement("div");
      g.className = "grid2";
      g.appendChild(mk("Rita", "SLOT0", "btn accent"));
      g.appendChild(mk("Carpincha", "SLOT1", "btn accent"));
      g.appendChild(mk("Ovejita", "SLOT2", "btn accent"));
      g.appendChild(mk("Patito", "SLOT3", "btn accent"));
      g.appendChild(mk("Vaquita", "SLOT4", "btn accent"));
      g.appendChild(mk("Poder Argentino 🇦🇷", "HAT", "btn alt"));
      el.appendChild(g);

      el.appendChild(Object.assign(document.createElement("div"), {
        className:"hint",
        textContent:"Tip: los comandos salen como P1_SLOT0 / P2_HAT. Unity los recibe por /api/poll."
      }));
      return;
    }

    if(stage === "wait"){
      el.innerHTML = `<div class="sectionTitle">Espera</div>`;
      el.appendChild(mk("OK", "OK", "btn accent"));
      return;
    }

    el.innerHTML = `<div class="muted">Stage desconocido: <b>${stage}</b></div>`;
  }

  pollPresence();
  setInterval(pollPresence, 700);
</script>
</body>
</html>
